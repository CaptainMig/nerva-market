<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERVA MARKET v4.8 — Quantum Decision Intelligence</title>
    <style>
        /* BOOSTED CONTRAST COLOR PALETTE */
        :root {
            --bg: #050b14;      /* Deepest Space */
            --panel: #0d1a2b;   /* Panel Background */
            --bdr: #1e2f45;     /* Border Contrast */
            --dim: #7aa0bd;     /* Label Text - Brightened 2x */
            --mid: #a0c4d8;     /* Secondary Text - Brightened 2x */
            --txt: #ffffff;     /* Primary Text */
            --brand: #f0b90b;   /* Nerva Gold */
            --up: #00ff88;      /* Neon Green */
            --dn: #ff4466;      /* Neon Red */
            --wait: #ffcc00;    /* Amber */
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* TOOLTIP SYSTEM */
        [data-tooltip] {
            position: relative;
            cursor: help;
            border-bottom: 1px dashed var(--dim);
        }

        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a3a;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            width: 220px;
            font-size: 12px;
            line-height: 1.4;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--brand);
        }

        /* GRID LAYOUT */
        .container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            height: 100vh;
            gap: 1px;
            background: var(--bdr);
        }

        .panel { background: var(--panel); padding: 20px; overflow-y: auto; }

        /* QUANTUM METRICS PANEL */
        .quantum-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            padding: 15px;
        }

        .q-stat { text-align: center; }
        .q-label { color: var(--dim); font-size: 11px; margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
        .q-val { font-family: monospace; font-size: 18px; color: var(--brand); }

        /* NOISE FILTER BADGE */
        .filter-badge {
            background: rgba(255, 204, 0, 0.1);
            color: var(--wait);
            border: 1px solid var(--wait);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 8px;
        }

        h1, h2, h3 { margin: 0; color: var(--brand); font-weight: 800; }
        .stat-label { color: var(--dim); font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container" id="app">
    </div>

<script>
    // QUANTUM DEFINITIONS
    const Q_INFO = {
        S: "ENTROPY: Measures noise/uncertainty. Lower is better (<10% is clinical).",
        COH: "COHERENCE: Alignment between price action and Nerva strategy. Higher is better.",
        POS: "PROBABILITY: The net likelihood that the current decision is 'The Truth'."
    };

    async function fetchNerva() {
        const app = document.getElementById('app');
        try {
            const resp = await fetch('/api/market');
            const data = await resp.json();
            
            renderUI(data);
        } catch (e) {
            app.innerHTML = `<div style="padding: 40px; color: red;">INITIALIZING SIMULATION... (API Pending)</div>`;
        }
    }

    function renderUI(m) {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="panel">
                <h2 style="font-size: 14px; margin-bottom: 20px;">PORTFOLIO</h2>
                ${m.portfolio.map(s => `
                    <div style="margin-bottom: 15px; border-bottom: 1px solid var(--bdr); padding-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span style="font-weight: bold;">${s.sym}</span>
                            <span style="color: ${s.changePct >= 0 ? 'var(--up)' : 'var(--dn)'}">${s.changePct.toFixed(2)}%</span>
                        </div>
                        <div style="font-size: 20px; margin-top: 5px;">$${s.price.toFixed(2)}</div>
                    </div>
                `).join('')}
            </div>

            <div class="panel" style="border-left: 1px solid var(--bdr); border-right: 1px solid var(--bdr);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <div>
                        <h1 style="font-size: 24px;">NERVA MARKET <span style="color: var(--up); font-size: 12px;">● LIVE</span></h1>
                        <div style="color: var(--dim); font-size: 12px; margin-top: 4px;">REGIME: STRONG UPTREND</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 32px; font-weight: 900; color: var(--brand);">HOLD</div>
                        <div style="color: var(--wait); font-size: 11px; letter-spacing: 2px;">CAUTION</div>
                    </div>
                </div>

                <div class="quantum-grid">
                    <div class="q-stat">
                        <div class="q-label" data-tooltip="${Q_INFO.S}">S(ρ) (?)</div>
                        <div class="q-val">3%</div>
                    </div>
                    <div class="q-stat">
                        <div class="q-label" data-tooltip="${Q_INFO.COH}">|ρ₀₁| (?)</div>
                        <div class="q-val">82%</div>
                    </div>
                    <div class="q-stat">
                        <div class="q-label" data-tooltip="${Q_INFO.POS}">ρ₀₀ (?)</div>
                        <div class="q-val">91%</div>
                    </div>
                </div>

                <div style="margin-top: 40px;">
                    <h3 style="font-size: 14px; color: var(--dim); margin-bottom: 15px;">TERMINAL ANALYSIS</h3>
                    <p style="color: var(--mid); line-height: 1.6; font-size: 15px;">
                        System state vector is locked to |HOLD⟩. Market Quality is high (71/100) but Execution logic 
                        remains guarded due to <strong>FOMC window volatility</strong>. Coherence is peak; 
                        watch for Entropy spikes above 15% before scaling out.
                    </p>
                </div>
            </div>

            <div class="panel">
                <h2 style="font-size: 14px; margin-bottom: 20px;">SECTOR ROTATION</h2>
                ${Object.entries(m.sectors).map(([name, val]) => `
                    <div style="margin-bottom: 12px;">
                        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px;">
                            <span style="color: var(--dim);">${name}</span>
                            <span style="color: ${val >= 0 ? 'var(--up)' : 'var(--dn)'}">${val.toFixed(2)}%</span>
                        </div>
                        <div style="height: 6px; background: #1a2a3a; border-radius: 3px; overflow: hidden;">
                            <div style="width: ${Math.min(Math.abs(val) * 20, 100)}%; height: 100%; background: ${val >= 0 ? 'var(--up)' : 'var(--dn)'}; opacity: 0.7;"></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    fetchNerva();
    setInterval(fetchNerva, 60000);
</script>

</body>
</html>
