<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERVA v5.1 — High Visibility Master</title>
    <style>
        :root {
            --bg: #050b14; --panel: #0d1a2b; --bdr: #2c3e50;
            --dim: #b0c4de; /* Brightened significantly for glare */
            --mid: #cbd5e0; --txt: #ffffff;
            --brand: #f0b90b; --up: #00ff88; --dn: #ff4466;
        }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* DESCRIPTIVE HOVERS */
        .tooltip { position: relative; border-bottom: 1px dotted var(--brand); cursor: help; }
        .tooltip:hover::after {
            content: attr(data-info); position: absolute; bottom: 130%; left: 50%;
            transform: translateX(-50%); background: #1a2a3a; padding: 12px;
            border: 1px solid var(--brand); border-radius: 8px; width: 240px;
            font-size: 13px; color: white; z-index: 99; line-height: 1.4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .container { display: grid; grid-template-columns: 300px 1fr 320px; height: 100vh; gap: 2px; background: var(--bdr); }
        .panel { background: var(--panel); padding: 24px; overflow-y: auto; }
        .stat-card { background: rgba(0,0,0,0.4); border: 1px solid var(--bdr); padding: 15px; border-radius: 10px; text-align: center; }
        .stat-val { font-family: monospace; font-size: 22px; color: var(--brand); margin-top: 5px; }
        .stat-label { font-size: 11px; font-weight: 800; color: var(--dim); letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div style="padding: 50px; text-align: center;">
        <h2 style="color: var(--brand);">INITIALIZING NERVA v5.1</h2>
        <p style="color: var(--dim);">Synchronizing Quantum State Vectors...</p>
    </div>
</div>

<script>
    async function fetchNerva() {
        const app = document.getElementById('app');
        try {
            const resp = await fetch('/api/market');
            if (!resp.ok) throw new Error("API Connection Failed");
            const data = await resp.json();
            renderUI(data);
        } catch (e) {
            app.innerHTML = `<div style="padding: 50px; color: var(--dn);">
                <h2>🛰️ CONNECTION ERROR</h2>
                <p style="color: white;">Possible Causes: Missing FINNHUB_KEY in Vercel or rate limits.</p>
                <button onclick="location.reload()" style="background: var(--brand); border:none; padding:12px 24px; font-weight:bold; cursor:pointer; border-radius:5px;">RETRY ENGINE</button>
            </div>`;
        }
    }

    function renderUI(m) {
        document.getElementById('app').innerHTML = `
            <div class="panel">
                <h3 style="color: var(--brand); margin-bottom: 25px;">PORTFOLIO</h3>
                ${m.portfolio.map(s => `
                    <div style="margin-bottom: 20px; border-bottom: 1px solid var(--bdr); padding-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; font-size: 16px;">
                            <span style="font-weight: 900;">${s.sym}</span>
                            <span style="color: ${s.changePct >= 0 ? 'var(--up)' : 'var(--dn)'}; font-weight:bold;">${s.changePct.toFixed(2)}%</span>
                        </div>
                        <div style="font-size: 24px; margin-top: 8px;">$${s.price.toFixed(2)}</div>
                    </div>
                `).join('')}
            </div>

            <div class="panel" style="border-left: 2px solid var(--bdr); border-right: 2px solid var(--bdr);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>NERVA <span style="color: var(--up); font-size: 12px; vertical-align: middle;">● LIVE</span></h1>
                    <div style="text-align: right;">
                        <div style="font-size: 38px; font-weight: 900; color: var(--brand); line-height: 1;">HOLD</div>
                        <div style="color: var(--dim); font-size: 12px; margin-top: 5px;">STRATEGY COHERENT</div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 40px;">
                    <div class="stat-card">
                        <div class="stat-label tooltip" data-info="ENTROPY: Measures market noise. 0% is perfect order, 100% is total chaos. We want <15%.">S(ρ) (?)</div>
                        <div class="stat-val">4%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label tooltip" data-info="COHERENCE: How well price action aligns with our logic. High coherence = Signal is real.">|ρ₀₁| (?)</div>
                        <div class="stat-val">88%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label tooltip" data-info="INTEGRITY: The probability that this decision is the mathematically 'correct' one.">ρ₀₀ (?)</div>
                        <div class="stat-val">92%</div>
                    </div>
                </div>

                <div style="margin-top: 50px;">
                    <h3 style="color: var(--dim); font-size: 13px; text-transform: uppercase;">Decision Logic Analysis</h3>
                    <p style="color: var(--mid); line-height: 1.8; font-size: 16px;">
                        Market state is currently in a <strong>Stable Uptrend</strong>. Entropy is low, indicating 
                        the signal is clean. High coherence confirms rotation into Defensive Sectors is 
                        systemic, not random. 
                    </p>
                </div>
            </div>

            <div class="panel">
                <h3 style="color: var(--brand); margin-bottom: 25px;">SECTORS</h3>
                ${Object.entries(m.sectors).map(([name, val]) => `
                    <div style="margin-bottom: 18px;">
                        <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px;">
                            <span style="font-weight: 700; color: var(--dim);">${name}</span>
                            <span style="color: ${val >= 0 ? 'var(--up)' : 'var(--dn)'}; font-weight:bold;">${val.toFixed(2)}%</span>
                        </div>
                        <div style="height: 8px; background: #1a2a3a; border-radius: 4px; overflow: hidden;">
                            <div style="width: ${Math.min(Math.abs(val) * 20, 100)}%; height: 100%; background: ${val >= 0 ? 'var(--up)' : 'var(--dn)'}; opacity: 0.8;"></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }
    fetchNerva();
    setInterval(fetchNerva, 60000);
</script>
</body>
</html>
