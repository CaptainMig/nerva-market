// ──────────────────────────────────────────────────────────────
// NERVA QUANTUM ENGINE
// Fixed entropy math per Opus's note:
// smoothedEnt = Math.max(ent, 0.05 * (1 - coh))
// prevents false-confidence 0% entropy readings when ρ₀₀ → 1
// ──────────────────────────────────────────────────────────────
const NERVA = {
  bloch(theta, phi) {
    const a = Math.cos(theta/2), b = Math.sin(theta/2);
    return {
      a, b, phi,
      x: Math.sin(theta)*Math.cos(phi),
      y: Math.sin(theta)*Math.sin(phi),
      z: Math.cos(theta)
    };
  },

  density(p) {
    const theta = Math.PI*(1-(p.S*0.3+p.Support*0.3+p.Stability*0.25+(1-p.R)*0.15));
    const phi = 2*Math.PI*p.E;
    const st = this.bloch(theta, phi);
    const rho00 = st.a**2;
    const coh = Math.sqrt((st.a*st.b*Math.cos(phi))**2+(st.a*st.b*Math.sin(phi))**2);
    return { rho00, coh, st };
  },

  entropy(dm) {
    const { rho00, coh } = dm;
    const det = rho00*(1-rho00)-coh**2;
    const disc = Math.sqrt(Math.max(0, 0.25-det));
    const l1 = Math.max(1e-10, 0.5+disc);
    const l2 = Math.max(1e-10, 0.5-disc);
    const rawEnt = -(l1*Math.log2(l1)+l2*Math.log2(l2));
    // FIX: smooth entropy floor — prevents false 0% when coh is low
    const smoothedEnt = Math.max(rawEnt, 0.05*(1-coh));
    return Math.min(1, Math.max(0, smoothedEnt));
  },

  classify(p) {
    const dm = this.density(p);
    const ent = this.entropy(dm);
    const { coh, rho00, st } = dm;
    let decision, zone, color;

    if      (coh>0.4 && rho00>0.65 && ent<0.4)  { decision="COMMIT";   zone="TRADE";    color=C.green;  }
    else if (coh>0.3 && rho00>0.5  && ent<0.6)  { decision="HOLD";     zone="CAUTION";  color=C.yellow; }
    else if (ent>0.7 || coh<0.15)               { decision="WAIT";     zone="NO TRADE"; color=C.mid;    }
    else if (rho00<0.35 && coh>0.3)             { decision="ESCALATE"; zone="HEDGE";    color=C.orange; }
    else if (ent>0.8 && coh<0.1)                { decision="TOXIC";    zone="AVOID";    color=C.red;    }
    else                                         { decision="HOLD";     zone="CAUTION";  color=C.yellow; }

    const score = Math.round((rho00*0.35 + coh*0.35 + (1-ent)*0.3)*100);
    return { decision, zone, color, entropy:ent, coherence:coh, commitProb:rho00, bloch:st, score, dm };
  }
};

// Simulation helpers (used as fallback when live data unavailable)
function rng(seed) { let s=seed; return ()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;}; }

function genStock(def, i, tick) {
  const r = rng(i*7919+tick*31);
  const n = ()=>(r()-0.5)*0.03;
  const w = Math.sin((Date.now()+i*1e6)/5e6);
  const price  = def.bp*(1+n()*2+w*0.02);
  const chgPct = n()*4+w*0.5;
  const vol    = 500000+r()*5e6;
  const sma20  = price*(1+(r()-0.55)*0.04);
  const sma50  = price*(1+(r()-0.52)*0.07);
  const sma200 = price*(1+(r()-0.48)*0.12);
  const rsi    = 40+r()*30+w*10;
  const above  = (price>sma20?1:0)+(price>sma50?1:0)+(price>sma200?1:0);
  const E       = Math.min(1,Math.max(0, Math.abs(chgPct)/5+(rsi>70||rsi<30?0.3:0)));
  const S       = above/3;
  const R       = Math.min(1,Math.max(0, (rsi>70?0.7:rsi<30?0.7:0.2)+Math.abs(chgPct)/8));
  const Support  = Math.min(1,Math.max(0, above/3*0.6+(vol>2e6?0.3:0.1)+0.1));
  const Stability= Math.min(1,Math.max(0, 0.5+(price>sma200?0.2:-0.2)+w*0.1));
  const nerva = NERVA.classify({E,S,R,Support,Stability});
  const bias  = price>sma50?"LONG":"SHORT";
  return { ...def, price, chgPct, vol, sma20, sma50, sma200, rsi, above, nerva, bias, live:false };
}

// Map live proxy portfolio/universe data → stock shape
function liveToStock(def, liveStockData) {
  if (!liveStockData) return null;
  const { price, changePct, volume, sma50, sma200 } = liveStockData;
  const chgPct = changePct || 0;
  const sma20  = price * 0.99; // approximate
  const rsi    = 50;            // RSI not in quote endpoint; needs chart call
  const above  = (price>sma20?1:0)+(price>sma50?1:0)+(price>sma200?1:0);
  const E       = Math.min(1,Math.max(0, Math.abs(chgPct)/5));
  const S       = above/3;
  const R       = Math.min(1,Math.max(0, (chgPct<-3?0.7:0.2)+Math.abs(chgPct)/8));
  const Support  = Math.min(1,Math.max(0, above/3*0.7+0.15));
  const Stability= Math.min(1,Math.max(0, 0.5+(price>sma200?0.25:-0.2)));
  const nerva = NERVA.classify({E,S,R,Support,Stability});
  const bias  = price>(sma50||price*0.97) ? "LONG" : "SHORT";
  return { ...def, price, chgPct, vol:volume||0, sma20, sma50:sma50||0, sma200:sma200||0, rsi, above, nerva, bias, live:true };
}

function mktParams(d) {
  const vN = Math.max(0,Math.min(1,(d.vix.level-10)/30));
  const fU = d.macro.fomc<3?0.9:d.macro.fomc<7?0.6:0.3;
  const E  = vN*0.6 + fU*0.4;
  const S  = (d.spy.price>d.spy.sma20?0.25:0)+(d.spy.price>d.spy.sma50?0.25:0)+(d.spy.price>d.spy.sma200?0.3:0)+(d.qqq.price>d.qqq.sma50?0.2:0);
  const rR = d.spy.rsi>70?0.7:d.spy.rsi<30?0.8:0.2;
  const vR = d.vix.level>25?0.8:d.vix.level>20?0.5:0.2;
  const R  = vR*0.4 + rR*0.3 + Math.min(1,d.putCall.ratio)*0.3;
  const bA = (d.breadth.a20+d.breadth.a50+d.breadth.a200)/300;
  const sP = Object.values(d.sectors).filter(v=>v>0).length/11;
  const Support = bA*0.6 + sP*0.4;
  const mS = d.macro.fed==="dovish"?0.8:d.macro.fed==="neutral"?0.6:0.3;
  const eA = (d.exec.br+d.exec.rt+d.exec.pb+d.exec.ft)/4;
  const Stability = mS*0.4 + eA*0.6;
  return {E,S,R,Support,Stability};
}

function ScrollingTicker({ data, stocks }) {
  const [offset, setOffset] = useState(0);
  useEffect(()=>{
    const iv = setInterval(()=>setOffset(o=>o-0.6),25);
    return ()=>clearInterval(iv);
  },[]);

  const tickers = [
    {sym:"SPY",  p:data.spy.price,      ch:data.spy.chgPct||0},
    {sym:"QQQ",  p:data.qqq.price,      ch:data.qqq.chgPct||0},
    {sym:"VIX",  p:data.vix.level,      ch:data.vix.chgPct||0, raw:true},
    {sym:"DXY",  p:data.macro.dxy.l,    ch:data.macro.dxy.chg||0, raw:true},
    {sym:"10Y",  p:data.macro.tny.y,    ch:data.macro.tny.chg||0, raw:true, pct:true},
    ...stocks.map(s=>({sym:s.sym,p:s.price,ch:s.chgPct,nc:s.nerva.color,nd:s.nerva.decision.slice(0,3)})),
    ...data.sorted.slice(0,5).map(([s,v])=>({sym:s,p:null,ch:v})),
  ];
  const items = [...tickers,...tickers,...tickers];
  const itemW = 145;
  const totalW = tickers.length * itemW;

  return (
    <div style={{overflow:"hidden",borderBottom:`1px solid ${C.border}`,background:`${C.panel}`,height:30,position:"relative",flexShrink:0}}>
      {/* scanline effect */}
      <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,0.15) 1px,rgba(0,0,0,0.15) 2px)",pointerEvents:"none",zIndex:1}}/>
      <div style={{display:"flex",position:"absolute",top:0,left:0,transform:`translateX(${offset%totalW}px)`,whiteSpace:"nowrap",height:30,alignItems:"center"}}>
        {items.map((t,i)=>{
          const neg = t.ch<0;
          const fmt = t.pct ? t.p.toFixed(2)+"%" : t.raw ? t.p.toFixed(2) : t.p ? "$"+t.p.toFixed(t.p<20?2:t.p<200?1:0) : null;
          return (
            <div key={i} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"0 14px",borderRight:`1px solid ${C.border}30`,height:30,minWidth:itemW}}>
              <span style={{fontSize:9,fontFamily:MONO,color:t.nc||C.accent,fontWeight:"bold",letterSpacing:1}}>{t.sym}</span>
              {t.nd&&<span style={{fontSize:6,fontFamily:MONO,color:t.nc,opacity:0.7,letterSpacing:0.5}}>{t.nd}</span>}
              {fmt&&<span style={{fontSize:9,fontFamily:MONO,color:C.text}}>{fmt}</span>}
              <span style={{fontSize:8,fontFamily:MONO,color:neg?C.red:C.green,fontWeight:500}}>
                {neg?"▼":"▲"}{Math.abs(t.ch).toFixed(2)}%
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Bloch Sphere ──
function BlochSphere({ bloch, size=90, color=C.green }) {
  const cx=size/2, cy=size/2, r=size*0.38;
  const px=cx+bloch.x*r, py=cy-bloch.z*r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>
        <radialGradient id="bsg" cx="38%" cy="32%">
          <stop offset="0%" stopColor="#1a3a5c"/>
          <stop offset="100%" stopColor="#060e1a"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <ellipse cx={cx} cy={cy} rx={r} ry={r*0.3} fill="none" stroke="#2a5a8a" strokeWidth="0.8" strokeDasharray="3,2" opacity="0.7"/>
      <circle cx={cx} cy={cy} r={r} fill="url(#bsg)" stroke="#2a6a9a" strokeWidth="1.4" opacity="0.8"/>
      <line x1={cx} y1={cy-r} x2={cx} y2={cy+r} stroke="#2a5a8a" strokeWidth="0.7" strokeDasharray="3,3" opacity="0.6"/>
      <line x1={cx-r} y1={cy} x2={cx+r} y2={cy} stroke="#2a5a8a" strokeWidth="0.7" strokeDasharray="3,3" opacity="0.6"/>
      <text x={cx} y={cy-r-5} fill={C.accent} fontSize="7" textAnchor="middle" fontFamily={MONO} opacity="0.9">|COMMIT⟩</text>
      <text x={cx} y={cy+r+10} fill={C.red} fontSize="7" textAnchor="middle" fontFamily={MONO} opacity="0.9">|AVOID⟩</text>
      {/* State vector */}
      <line x1={cx} y1={cy} x2={px} y2={py} stroke={color} strokeWidth="2" opacity="0.95" filter="url(#glow)"/>
      {/* Outer halo */}
      <circle cx={px} cy={py} r="8" fill={color} opacity="0.08">
        <animate attributeName="r" values="5;11;5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      {/* Mid halo */}
      <circle cx={px} cy={py} r="5" fill={color} opacity="0.15">
        <animate attributeName="r" values="3;7;3" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      {/* State dot */}
      <circle cx={px} cy={py} r="3.5" fill={color} opacity="0.95">
        <animate attributeName="opacity" values="1;0.65;1" dur="2.5s" repeatCount="indefinite"/>
      </circle>

        display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0,
        border:`1px solid ${C.border}`,borderRadius:3,overflow:"hidden",
        background:C.panel,width:"100%",marginTop:2,
      }}>
        {[
          ["S(ρ)",    entropy,    entropy>0.6?C.red:entropy<0.3?C.green:C.yellow,    "VON NEUMANN\nENTROPY"],

          ["ρ₀₀",    commitProb, commitProb>0.6?C.green:commitProb>0.45?C.yellow:C.red,"COMMIT\nPROB"],

function MiniBloch({ bloch, size=48, color=C.green }) {
  const cx=size/2,cy=size/2,r=size*0.36;
  const px=cx+bloch.x*r,py=cy-bloch.z*r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#2a5a8a" strokeWidth="0.8" opacity="0.6"/>
      <line x1={cx} y1={cy} x2={px} y2={py} stroke={color} strokeWidth="1.5" opacity="0.9"/>
      <circle cx={px} cy={py} r="3" fill={color} opacity="0.9">
        <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
  );
}

function ScoreRing({ score, size=100, label }) {
  const r=(size-18)/2, circ=2*Math.PI*r, fill=(score/100)*circ;
  const c=score>=80?C.green:score>=60?C.yellow:C.red;
  return (
    <div style={{textAlign:"center"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.panel} strokeWidth="6"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth="6"
          strokeDasharray={`${fill} ${circ-fill}`} strokeDashoffset={circ/4} strokeLinecap="round"
          style={{transition:"stroke-dasharray 0.8s", filter:`drop-shadow(0 0 4px ${c}60)`}}/>
        <text x={size/2} y={size/2-3} fill={c} fontSize={size>85?20:15} fontWeight="bold" textAnchor="middle" fontFamily={MONO}>{score}</text>
        <text x={size/2} y={size/2+11} fill={C.mid} fontSize={6.5} textAnchor="middle" fontFamily={MONO}>/ 100</text>
      </svg>
      {label&&<div style={{color:C.mid,fontSize:7.5,fontFamily:MONO,letterSpacing:1.5,textTransform:"uppercase",marginTop:-4}}>{label}</div>}
    </div>
  );
}

function Bar({ value, label, max=1 }) {
  const pct=Math.round((value/max)*100);

  return(
    <div style={{marginBottom:5}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:8.5,color:C.mid,fontFamily:MONO,marginBottom:2}}>
        <span>{label}</span><span style={{color:c}}>{pct}%</span>

      <div style={{height:3,background:C.bg,borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:c,borderRadius:2,transition:"width 0.7s",boxShadow:`0 0 4px ${c}60`}}/>
      </div>
    </div>
  );
}

  const [mkt,   setMkt]   = useState(null);
  const [mktR,  setMktR]  = useState(null);
  const [port,  setPort]  = useState([]);
  const [uni,   setUni]   = useState([]);
  const [cats,  setCats]  = useState(null);
  const [execS, setExecS] = useState(0);
  const [mode,  setMode]  = useState("swing");
  const [tab,   setTab]   = useState("portfolio");
  const [exp,   setExp]   = useState(null);
  const [guide, setGuide] = useState(false);
  const [secAgo,setSecAgo]= useState(0);
  const [isLive,setIsLive]= useState(false);
  const [loading,setLoading]=useState(true);
  const tickRef = useRef(0);

  const buildStocks = useCallback((defs, genFn, liveArr) => {
    if (liveArr && liveArr.length) {
      return defs.map(def => {
        const ld = liveArr.find(s=>s.sym===def.sym);
        const live = ld ? liveToStock(def, ld) : null;
        return live || genFn(def, defs.indexOf(def), tickRef.current);
      });
    }
    return defs.map((def,i) => genFn(def, i, tickRef.current));
  },[]);

  const refresh = useCallback(async () => {
    // Try live first
    const live = await fetchLiveData();
    let d;
    if (live) {
      d = live;
      setIsLive(true);
    } else {
      d = genMarket(tickRef.current);
      setIsLive(false);
    }

    const rawP = mktParams(d);
    const adj  = mode==="day" ? {...rawP, E:Math.min(1,rawP.E*1.3), R:Math.min(1,rawP.R*1.2)} : rawP;
    const res  = NERVA.classify(adj);

    // Build portfolio stocks
    const pd = buildStocks(
      PORTFOLIO_DEFS,
      (def,i,t) => genStock(def, i, t),
      live?.rawPortfolio
    );

    // Build universe, sort by opportunity surface score
    const ud = buildStocks(
      UNIVERSE_DEFS,
      (def,i,t) => genStock(def, i+100, t),
      live?.rawUniverse
    ).sort((a,b)=>
      (b.nerva.coherence*0.4+b.nerva.commitProb*0.35+(1-b.nerva.entropy)*0.25)-
      (a.nerva.coherence*0.4+a.nerva.commitProb*0.35+(1-a.nerva.entropy)*0.25)
    ).slice(0,25);

    // Category scores
    const vs  = Math.min(100,Math.max(0,Math.round((1-Math.min(1,(d.vix.level-10)/25))*70+(d.vix.trend5d<0?20:0)+(d.putCall.ratio<1?10:0))));
    const ts2 = Math.min(100,Math.max(0,Math.round(adj.S*100)));
    const bs  = Math.min(100,Math.max(0,Math.round((d.breadth.a20+d.breadth.a50+d.breadth.a200)/3)));
    const ms  = Math.min(100,Math.max(0,Math.round((Object.values(d.sectors).filter(v=>v>0).length/11)*60+Math.min(40,(d.spread||0)*20))));
    const mc  = Math.min(100,Math.max(0,Math.round((d.macro.fed==="dovish"?40:d.macro.fed==="neutral"?25:10)+(d.macro.tny.y<4.5?20:10)+(d.macro.fomc>7?20:5)+(d.macro.dxy.t==="weak"||d.macro.dxy.t==="weakening"?20:10))));
    const ex  = Math.round((d.exec.br*0.3+d.exec.rt*0.25+d.exec.pb*0.25+d.exec.ft*0.2)*100);

    setMkt(d); setMktR(res); setPort(pd); setUni(ud);
    setCats({v:vs,t:ts2,b:bs,m:ms,mc});
    setExecS(ex);
    setSecAgo(0);
    setLoading(false);
    tickRef.current++;
  }, [mode, buildStocks]);

  useEffect(()=>{
    refresh();
    const iv=setInterval(refresh, 45000);
    return ()=>clearInterval(iv);
  },[mode]);

  useEffect(()=>{
    const iv=setInterval(()=>setSecAgo(s=>s+1), 1000);
    return ()=>clearInterval(iv);
  },[]);

  if (loading||!mkt||!mktR||!cats) return (
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{color:C.accent,fontFamily:MONO,fontSize:12,letterSpacing:2,animation:"pulse 1.5s infinite"}}>◉ NERVA MARKET v4.0</div>
      <div style={{color:C.dim,fontFamily:MONO,fontSize:9,letterSpacing:1.5}}>INITIALIZING QUANTUM STATE EVALUATION...</div>
      <div style={{width:120,height:1,background:`linear-gradient(90deg,transparent,${C.accent},transparent)`,animation:"pulse 1s infinite"}}/>
    </div>
  );

  const dc     = mktR.color;
  const regime = mkt.spy.price>mkt.spy.sma50
    ? (mkt.spy.price>mkt.spy.sma200?"Strong Uptrend":"Early Recovery")
    : (mkt.spy.price<mkt.spy.sma200?"Confirmed Downtrend":"Chop / Distribution");
  const stocks = tab==="portfolio" ? port : uni;

  // Terminal analysis text
  const analysis = {
    COMMIT:  `State vector locked to |COMMIT⟩. Coherence at ${(mktR.coherence*100).toFixed(0)}% — signals are in agreement. ${regime}. Sector participation healthy. Full position sizing with disciplined stops. Press risk on A+ setups.`,
    HOLD:    `Mixed coherence at ${(mktR.coherence*100).toFixed(0)}%. Entropy ${(mktR.entropy*100).toFixed(0)}% — partial signal degradation detected. ${regime}. Sector leadership narrowing. A+ setups only, half position size. Watch for coherence recovery above 40%.`,
    WAIT:    `High entropy (${(mktR.entropy*100).toFixed(0)}%). State vector decoherent — no stable structure. ${regime}. No reliable setup context. Preserve capital until S(ρ) drops below 50%.`,
    ESCALATE:`Inverse alignment. State vector drifting toward |AVOID⟩ with coherence at ${(mktR.coherence*100).toFixed(0)}%. ${regime}. Consider hedging or reducing gross exposure. Hold dry powder.`,
    TOXIC:   `TOXIC state. Maximum entropy, minimum coherence. ${regime}. No actionable signal exists. Full capital preservation. Do not trade until regime clears.`,
  }[mktR.decision]||"";

  return (
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:MONO,color:C.text,position:"relative"}}>
      {guide&&<Guide onClose={()=>setGuide(false)}/>}

      {/* Horizontal scrolling ticker */}
      <ScrollingTicker data={mkt} stocks={port}/>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Left vertical rail */}
        <TickerRail stocks={port} mkt={mkt}/>

        {/* Main content */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>

          {/* FOMC Alert Banner */}
          {mkt.macro.fomc<3&&(
            <div style={{background:`${C.red}12`,borderBottom:`1px solid ${C.red}30`,padding:"5px 18px",fontSize:9,color:C.red,flexShrink:0,display:"flex",gap:8,alignItems:"center"}}>
              <span style={{animation:"blink 1s infinite"}}>⚠</span>
              FOMC MEETING WITHIN 72 HOURS — REDUCE POSITION SIZING — ELEVATED VOLATILITY RISK
              <Tag text="MACRO EVENT" color={C.red}/>
            </div>
          )}

          {/* Top bar */}
          <div style={{
            borderBottom:`1px solid ${C.border}`,padding:"6px 16px",
            display:"flex",justifyContent:"space-between",alignItems:"center",
            background:`linear-gradient(180deg,${C.panel}90,${C.bg})`,flexShrink:0,
          }}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{color:C.accent,fontSize:13,fontWeight:"bold",letterSpacing:3,textShadow:`0 0 20px ${C.accent}40`}}>◉ NERVA</span>
              <span style={{color:C.dim,fontSize:8,letterSpacing:1.5}}>MARKET v4.0</span>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:5,height:5,borderRadius:"50%",background:isLive?C.green:C.yellow,boxShadow:`0 0 6px ${isLive?C.green:C.yellow}`,animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:7.5,color:isLive?C.green:C.yellow,letterSpacing:1}}>{isLive?"LIVE":"SIMULATION"}</span>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,fontSize:8.5,color:C.dim}}>
              <span style={{color:C.dim}}>{secAgo}s ago</span>
              <button onClick={refresh} style={{background:C.border,border:"none",borderRadius:3,color:C.accent,fontSize:8,padding:"3px 8px",cursor:"pointer",fontFamily:MONO,letterSpacing:1}}>↻ REFRESH</button>
              <div style={{display:"flex",border:`1px solid ${C.border}`,borderRadius:3,overflow:"hidden"}}>
                {["swing","day"].map(m=>(
                  <button key={m} onClick={()=>setMode(m)} style={{
                    background:mode===m?C.accentD:"transparent",border:"none",
                    color:mode===m?C.bright:C.dim,fontSize:7.5,padding:"3px 8px",
                    cursor:"pointer",fontFamily:MONO,textTransform:"uppercase",letterSpacing:1,
                  }}>{m}</button>
                ))}
              </div>
              <button onClick={()=>setGuide(true)} style={{background:"none",border:`1px solid ${C.accent}40`,borderRadius:3,color:C.accent,fontSize:8,padding:"3px 9px",cursor:"pointer",fontFamily:MONO,letterSpacing:0.5}}>? GUIDE</button>
            </div>
          </div>

          {/* Scrollable content */}
          <div style={{flex:1,overflowY:"auto",padding:"12px 14px",scrollbarWidth:"thin",scrollbarColor:`${C.border} transparent`}}>

            {/* ── HERO PANEL ── */}
            <div style={{
              display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:16,alignItems:"center",
              marginBottom:12,padding:"14px 16px",
              border:`1px solid ${dc}25`,borderRadius:6,
              background:`linear-gradient(135deg,${C.panel}60,${dc}04)`,
              boxShadow:`inset 0 0 40px ${dc}04`,
              position:"relative",overflow:"hidden",
            }}>
              {/* Subtle scan line */}
              <div style={{position:"absolute",top:0,left:0,right:0,height:"100%",background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px)",pointerEvents:"none"}}/>

              {/* Left: Decision */}
              <div>
                <div style={{fontSize:7,color:C.dim,letterSpacing:2.5,marginBottom:4,fontFamily:MONO}}>NERVA DECISION STATE</div>
                <div style={{fontSize:28,fontWeight:"bold",color:dc,letterSpacing:3,textShadow:`0 0 30px ${dc}50`,lineHeight:1.1,fontFamily:MONO}}>
                  {mktR.decision}
                </div>
                <div style={{marginTop:6,display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                  <Tag text={mktR.zone} color={dc}/>
                  <Tag text={`${mode.toUpperCase()} MODE`} color={C.accentD}/>
                </div>
                <div style={{marginTop:7,fontSize:8.5,color:C.mid,lineHeight:1.6}}>
                  <span style={{color:C.dim}}>Regime: </span><span style={{color:C.text}}>{regime}</span><br/>
                  <span style={{color:C.dim}}>SPY: </span><span style={{color:mkt.spy.chgPct>=0?C.green:C.red}}>{mkt.spy.chgPct>=0?"+":""}{(mkt.spy.chgPct||0).toFixed(2)}%</span>
                  <span style={{color:C.dim,margin:"0 6px"}}>·</span>
                  <span style={{color:C.dim}}>VIX: </span><span style={{color:mkt.vix.level<20?C.green:mkt.vix.level<25?C.yellow:C.red}}>{mkt.vix.level.toFixed(1)}</span>
                </div>
              </div>

              {/* Center: Score rings */}
              <div style={{display:"flex",gap:10,alignItems:"center",flexDirection:"column"}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <ScoreRing score={mktR.score} size={100} label="Market Quality"/>
                  <ScoreRing score={execS}       size={72}  label="Execution"/>
                </div>
              </div>

              {/* Right: Quantum metrics (FIXED unified layout) */}
              <div style={{display:"flex",justifyContent:"flex-end"}}>
                <QuantumPanel result={mktR} size={90}/>
              </div>
            </div>

            {/* ── CATEGORY PANELS ── */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:7,marginBottom:12}}>
              <CatMini title="Volatility" score={cats.v} icon="◈" items={[
                {l:"VIX",     v:mkt.vix.level.toFixed(1),    d:mkt.vix.trend5d<0?" ↓":" ↑",c:mkt.vix.level<20?C.green:mkt.vix.level<25?C.yellow:C.red},
                {l:"VVIX",    v:mkt.vvix.level.toFixed(0)},
                {l:"P/C",     v:mkt.putCall.ratio.toFixed(2), c:mkt.putCall.ratio<0.9?C.green:mkt.putCall.ratio<1.1?C.yellow:C.red},
              ]}/>
              <CatMini title="Trend" score={cats.t} icon="◇" items={[
                {l:"vs 20d",  v:mkt.spy.price>mkt.spy.sma20?"ABV":"BLW",  c:mkt.spy.price>mkt.spy.sma20?C.green:C.red},
                {l:"vs 50d",  v:mkt.spy.price>mkt.spy.sma50?"ABV":"BLW",  c:mkt.spy.price>mkt.spy.sma50?C.green:C.red},
                {l:"vs 200d", v:mkt.spy.price>mkt.spy.sma200?"ABV":"BLW", c:mkt.spy.price>mkt.spy.sma200?C.green:C.red},
                {l:"RSI",     v:mkt.spy.rsi.toFixed(0), c:mkt.spy.rsi>70?C.red:mkt.spy.rsi<30?C.green:C.text},
              ]}/>
              <CatMini title="Breadth" score={cats.b} icon="◎" items={[
                {l:">20d",    v:`${mkt.breadth.a20.toFixed(0)}%`,           c:mkt.breadth.a20>60?C.green:mkt.breadth.a20>45?C.yellow:C.red},
                {l:">50d",    v:`${mkt.breadth.a50.toFixed(0)}%`,           c:mkt.breadth.a50>55?C.green:C.yellow},
                {l:">200d",   v:`${mkt.breadth.a200.toFixed(0)}%`,          c:mkt.breadth.a200>55?C.green:C.yellow},
                {l:"A/D",     v:mkt.breadth.ad.toFixed(2),                  c:mkt.breadth.ad>1?C.green:C.red},
              ]}/>
              <CatMini title="Momentum" score={cats.m} icon="◆" items={[
                {l:"Sec+ ",   v:`${Object.values(mkt.sectors).filter(v=>v>0).length}/11`},
                {l:"Spread",  v:`${(mkt.spread||0).toFixed(1)}%`,           c:(mkt.spread||0)>1?C.green:C.yellow},
                {l:"NH/NL",   v:mkt.breadth.nhNl.toFixed(1),                c:mkt.breadth.nhNl>1.5?C.green:C.yellow},
              ]}/>
              <CatMini title="Macro" score={cats.mc} icon="◫" items={[
                {l:"10Y",     v:`${mkt.macro.tny.y.toFixed(2)}%`,           d:mkt.macro.tny.t==="rising"?" ↑":" ↓", c:mkt.macro.tny.y<4.5?C.green:C.yellow},
                {l:"DXY",     v:mkt.macro.dxy.l.toFixed(1),                 d:mkt.macro.dxy.t==="str"||mkt.macro.dxy.t==="strengthening"?" ↑":" ↓"},
                {l:"Fed",     v:mkt.macro.fed.toUpperCase(),                 c:mkt.macro.fed==="dovish"?C.green:mkt.macro.fed==="neutral"?C.yellow:C.red},
                {l:"FOMC",    v:`${mkt.macro.fomc}d`,                       c:mkt.macro.fomc<3?C.red:mkt.macro.fomc<7?C.orange:C.mid},
              ]}/>
            </div>

            {/* ── SECTOR + ANALYSIS + EXECUTION ── */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <SectorMap sectors={mkt.sorted}/>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {/* Terminal Analysis */}
                <div style={{
                  padding:"10px 12px",border:`1px solid ${dc}18`,borderRadius:5,
                  background:`${dc}05`,flex:1,
                }}>
                  <div style={{fontSize:7.5,color:dc,letterSpacing:2,marginBottom:6,fontFamily:MONO}}>◉ NERVA TERMINAL ANALYSIS</div>
                  <div style={{fontSize:9,lineHeight:1.75,color:C.text,fontFamily:MONO}}>{analysis}</div>
                </div>
                {/* Execution Window */}
                <Panel title="EXECUTION WINDOW" icon="⚡" style={{background:C.panel}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:18,fontWeight:"bold",color:execS>=70?C.green:execS>=50?C.yellow:C.red,fontFamily:MONO}}>
                      {execS}<span style={{fontSize:8.5,color:C.mid}}>/100</span>
                    </span>
                    <Tag text="NOT IN MAIN SCORE" color={C.dim} small/>
                  </div>
                  <Bar label="Breakouts Holding" value={mkt.exec.br}/>
                  <Bar label="Gain Retention"    value={mkt.exec.rt}/>
                  <Bar label="Pullback Buying"   value={mkt.exec.pb}/>
                  <Bar label="Follow-Through"    value={mkt.exec.ft}/>
                </Panel>
              </div>
            </div>

            {/* ── PORTFOLIO / WATCHLIST ── */}
            <div style={{border:`1px solid ${C.border}`,borderRadius:5,overflow:"hidden",marginBottom:12}}>
              {/* Tab bar */}
              <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.panel}}>
                {[["portfolio","◈ MY PORTFOLIO"],["watchlist","◆ OPPORTUNITY SURFACE (TOP 25)"]].map(([k,l])=>(
                  <button key={k} onClick={()=>{setTab(k);setExp(null);}} style={{
                    background:"transparent",border:"none",
                    borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",
                    color:tab===k?C.accent:C.dim,fontSize:8.5,
                    padding:"7px 14px",cursor:"pointer",fontFamily:MONO,letterSpacing:1,
                    transition:"color 0.2s",
                  }}>{l}</button>
                ))}
                <div style={{flex:1}}/>
                <div style={{display:"flex",alignItems:"center",padding:"0 12px",fontSize:7.5,color:C.dim}}>
                  {isLive?<span style={{color:C.greenD}}>● LIVE PRICES</span>:<span style={{color:C.yellow}}>● SIMULATED</span>}
                </div>
              </div>
              {/* Header */}
              <div style={{
                display:"grid",gridTemplateColumns:"48px 1fr 72px 52px 38px 100px 34px",
                padding:"5px 10px",fontSize:7.5,color:C.dim,fontFamily:MONO,letterSpacing:1,
                borderBottom:`1px solid ${C.border}`,background:`${C.panel}40`,
              }}>
                <span>SYM</span><span>NAME</span>
                <span style={{textAlign:"right"}}>PRICE</span>
                <span style={{textAlign:"right"}}>CHG%</span>
                <span style={{textAlign:"right"}}>RSI</span>
                <span style={{textAlign:"right"}}>NERVA STATE</span>
                <span style={{textAlign:"right"}}>NQ</span>
              </div>
              {/* Rows */}
              <div>
                {stocks.map(s=>(
                  <StockRow key={s.sym} stock={s} expanded={exp===s.sym} onToggle={()=>setExp(exp===s.sym?null:s.sym)}/>
                ))}
              </div>
            </div>

            {/* ── SCORE DECOMPOSITION ── */}
            <Panel title="SCORE DECOMPOSITION" icon="≡" style={{marginBottom:12}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 20px"}}>
                {[["Volatility",25,cats.v],["Trend",20,cats.t],["Breadth",20,cats.b],["Momentum",25,cats.m],["Macro/Liq",10,cats.mc]].map(([name,weight,score])=>{
                  const c=score>=70?C.green:score>=50?C.yellow:C.red;
                  const contrib=Math.round(weight/100*score);
                  return (
                    <div key={name} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",fontSize:8.5}}>
                      <span style={{width:70,color:C.mid,fontFamily:MONO}}>{name}</span>
                      <span style={{width:22,color:C.dim,textAlign:"right",fontFamily:MONO}}>{weight}%</span>
                      <div style={{flex:1,height:4,background:C.bg,borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${score}%`,background:c,borderRadius:2,opacity:0.7,transition:"width 0.7s",boxShadow:`0 0 4px ${c}40`}}/>
                      </div>
                      <span style={{width:22,color:c,textAlign:"right",fontFamily:MONO,fontWeight:"bold"}}>{score}</span>
                      <span style={{width:28,color:C.dim,textAlign:"right",fontFamily:MONO}}>→{contrib}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:8,paddingTop:7,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:8,color:C.dim,fontFamily:MONO}}>WEIGHTED MARKET QUALITY SCORE</span>
                <span style={{fontSize:14,color:mktR.score>=80?C.green:mktR.score>=60?C.yellow:C.red,fontWeight:"bold",fontFamily:MONO}}>{mktR.score} / 100</span>
              </div>
            </Panel>

            <div style={{textAlign:"center",padding:"8px 0 4px",fontSize:6.5,color:C.dim,letterSpacing:2.5,fontFamily:MONO}}>
              NERVA MARKET v4.0 — QUANTUM DECISION INTELLIGENCE — STARPOINT ENTERPRISES LLC — AMDG
            </div>
          </div>
        </div>
      </div>

      <style>{`
        @keyframes fadeIn {from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse {0%,100%{opacity:1}50%{opacity:0.35}}
        @keyframes blink {0%,49%{opacity:1}50%,100%{opacity:0.2}}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<NERVAMarketV4/>);
</script>
</body>
</html>
