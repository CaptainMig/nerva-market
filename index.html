const NERVA={
  bloch(theta,phi){
    return {x:Math.sin(theta)*Math.cos(phi),y:Math.sin(theta)*Math.sin(phi),z:Math.cos(theta)};
  },
  density(pr){
    const theta=Math.PI*(1-(pr.S*0.30+pr.Support*0.25+pr.Stability*0.20+(1-pr.R)*0.15+(1-pr.E)*0.10));
    const phi=2*Math.PI*pr.E;
    const st=this.bloch(theta,phi);
    const r00=(1+st.z)/2;
    const coh=Math.sqrt(st.x*st.x+st.y*st.y)/2;
    return {r00,coh,st};
  },
  entropy(dm){
    const det=dm.r00*(1-dm.r00)-dm.coh*dm.coh;
    const disc=Math.sqrt(Math.max(0,0.25-det));
    const l1=Math.max(1e-10,0.5+disc),l2=Math.max(1e-10,0.5-disc);
    const raw=-(l1*Math.log2(l1)+l2*Math.log2(l2));
    return Math.min(1,Math.max(0,Math.max(raw,0.05*(1-dm.coh*2))));
  },
  classify(pr){
    const dm=this.density(pr);
    const entropy=this.entropy(dm);
    const coherence=Math.min(1,dm.coh*2);
    const commitProb=Math.min(1,Math.max(0,dm.r00));
    const score=Math.round((commitProb*0.36 + coherence*0.34 + (1-entropy)*0.30) * 100);
    let decision='HOLD',zone='CAUTION',color=C.yellow;
    if(entropy>0.84 && coherence<0.12){decision='TOXIC';zone='AVOID';color=C.red;}
    else if(commitProb<0.35 && coherence>0.26){decision='ESCALATE';zone='DEFEND';color=C.orange;}
    else if(coherence>0.40 && commitProb>0.63 && entropy<0.42){decision='COMMIT';zone='TRADE';color=C.green;}
    else if(entropy>0.68 || coherence<0.18){decision='WAIT';zone='NO TRADE';color=C.dim;}
    return {decision,zone,color,entropy,coherence,commitProb,bloch:dm.st,score};
  }
};

function clamp(v,min,max){return Math.min(max,Math.max(min,v));}
function fp(v){if(v==null||Number.isNaN(v))return '--'; return v<20?v.toFixed(2):v<200?v.toFixed(1):v.toFixed(0);}
function pct(v){if(v==null||Number.isNaN(v))return '--'; return `${v>=0?'+':''}${v.toFixed(2)}%`;}
function volFmt(v){if(!v)return '--'; if(v>=1e9)return (v/1e9).toFixed(2)+'B'; if(v>=1e6)return (v/1e6).toFixed(1)+'M'; return (v/1e3).toFixed(0)+'K';}
function ago(ms){if(!ms)return '--'; const s=Math.max(0,Math.floor((Date.now()-ms)/1000)); return `${s}s`;}
function colorForScore(score){return score>=80?C.green:score>=60?C.yellow:C.red;}
function colorForPct(v){return v>=0?C.green:C.red;}
function rand(seed){let x=seed; return()=>{x=(x*1664525+1013904223)>>>0; return x/4294967296;};}
function noiseFilter(nerva,price,chgPct,rsi){
  const reasons=[];
  if(price<8) reasons.push('Low price (<$8)');
  if(Math.abs(chgPct)>5) reasons.push('High volatility (>5% move)');
  if(rsi>75) reasons.push('RSI overbought (>75)');
  if(rsi<25) reasons.push('RSI oversold (<25)');
  if(reasons.length && nerva.decision==='COMMIT'){
    return {...nerva,decision:'HOLD',zone:'FILTERED',color:C.yellow,filtered:true,filterReasons:reasons};
  }
  return {...nerva,filtered:false,filterReasons:[]};
}

function simulateMarket(tick){

  const wave=Math.sin((Date.now()/600000)+tick*0.1);
  const spy=575+wave*6+(r()-0.5)*8;
  const qqq=492+wave*7+(r()-0.5)*10;
  const vix=16.5-wave*2+(r()-0.5)*2.5;
  const sectors={};
  SECTOR_ORDER.forEach((sym,i)=>{sectors[sym]=((r()-0.44)*2.2)+Math.sin((tick+i)/6)*0.6;});
  const sorted=Object.entries(sectors).sort((a,b)=>b[1]-a[1]);
  const spread=(sorted.slice(0,3).reduce((s,e)=>s+e[1],0)/3)-(sorted.slice(-3).reduce((s,e)=>s+e[1],0)/3);
  return {
    spy:{price:spy,sma20:spy-2,sma50:spy-7,sma200:spy-26,rsi:56+wave*9,chgPct:(r()-0.45)*2.8},
    qqq:{price:qqq,sma50:qqq-6,chgPct:(r()-0.46)*3},
    vix:{level:vix,changePct:(r()-0.5)*6},
    vvix:{level:82+r()*14},
    putCall:{ratio:0.82+(r()-0.4)*0.25},
    breadth:{above20d:58+r()*18,above50d:53+r()*18,above200d:57+r()*14,advDeclineRatio:1.05+(r()-0.5)*0.8,nhNl:1.5+(r()-0.4)*1.6},
    sectors,sorted,spread,
    macro:{tenYear:{yield:4.22+(r()-0.5)*0.25,trend:wave>0?'rising':'falling'},dxy:{level:104.2+(r()-0.5)*1.8,trend:wave>0.35?'firm':'soft'},fedStance:'neutral',fomcDays:Math.floor(r()*18)+3},
    exec:{br:0.58+r()*0.25,rt:0.54+r()*0.24,pb:0.50+r()*0.28,ft:0.48+r()*0.28},
    live:false
  };
}

function rsiFromSeries(series){
  if(!Array.isArray(series)||series.length<15) return 55;
  let gains=0,losses=0;
  for(let i=1;i<15;i++){
    const d=series[i]-series[i-1];
    if(d>=0) gains+=d; else losses+=Math.abs(d);
  }
  const avgGain=gains/14, avgLoss=losses/14;
  if(avgLoss===0) return 100;
  const rs=avgGain/avgLoss;
  return 100-(100/(1+rs));
}

function marketParams(d){
  const vixRisk=clamp((d.vix.level-12)/20,0,1);
  const fomcUrgency=d.macro.fomcDays<3?0.95:d.macro.fomcDays<7?0.65:0.28;
  const modeBoost=S.mode==='day'?0.16:0;
  const E=clamp(vixRisk*0.55 + fomcUrgency*0.35 + modeBoost,0,1);
  const trend=((d.spy.price>d.spy.sma20)?0.23:0)+((d.spy.price>d.spy.sma50)?0.26:0)+((d.spy.price>d.spy.sma200)?0.31:0)+((d.qqq.price>d.qqq.sma50)?0.20:0);
  const rsiRisk=d.spy.rsi>70?0.72:d.spy.rsi<30?0.78:0.24;
  const putCallRisk=clamp(d.putCall.ratio/1.15,0,1);
  const R=clamp(vixRisk*0.40 + rsiRisk*0.28 + putCallRisk*0.22 + (S.mode==='day'?0.10:0),0,1);
  const breadth=((d.breadth.above20d+d.breadth.above50d+d.breadth.above200d)/300);
  const sectorBreadth=Object.values(d.sectors).filter(v=>v>0).length/11;
  const Support=clamp(breadth*0.62 + sectorBreadth*0.38,0,1);
  const macroBias=d.macro.fedStance==='dovish'?0.82:d.macro.fedStance==='neutral'?0.60:0.35;
  const exec=(d.exec.br+d.exec.rt+d.exec.pb+d.exec.ft)/4;
  return {E,S:trend,R,Support,Stability:clamp(macroBias*0.40 + exec*0.60,0,1)};
}

function categoryScores(m){
  const vol=100 - clamp((m.vix.level-12)/18,0,1)*100;
  const trend=((m.spy.price>m.spy.sma20)?26:0)+((m.spy.price>m.spy.sma50)?28:0)+((m.spy.price>m.spy.sma200)?30:0)+((m.qqq.price>m.qqq.sma50)?16:0);
  const breadth=((m.breadth.above20d*0.35)+(m.breadth.above50d*0.35)+(m.breadth.above200d*0.20)+(clamp(m.breadth.advDeclineRatio/2,0,1)*100*0.10));
  const momentum=(clamp((Object.values(m.sectors).filter(v=>v>0).length)/11,0,1)*55) + clamp((m.spread+2.5)/5,0,1)*45;
  const macro=(m.macro.fedStance==='dovish'?82:m.macro.fedStance==='neutral'?64:42) - (m.macro.fomcDays<3?18:m.macro.fomcDays<7?8:0);
  return {v:Math.round(vol),t:Math.round(trend),b:Math.round(breadth),m:Math.round(momentum),mc:Math.round(clamp(macro,0,100))};
}

function execScore(exec){return Math.round(((exec.br+exec.rt+exec.pb+exec.ft)/4)*100);}

function buildStockFromDef(def,idx,tick){
  const r=rand((idx+1)*9973 + tick*47);
  const wobble=Math.sin((Date.now()/750000)+(idx/3));
  const price=def.bp*(1+(r()-0.5)*0.04 + wobble*0.018);
  const chgPct=(r()-0.46)*4.8 + wobble*0.55;
  const sma20=price*(1+(r()-0.53)*0.04);
  const sma50=price*(1+(r()-0.51)*0.07);
  const sma200=price*(1+(r()-0.50)*0.12);
  const rsi=clamp(47+r()*24+wobble*8,18,86);
  const vol=600000+r()*6000000;
  return finalizeStock({...def,price,chgPct,sma20,sma50,sma200,rsi,volume:vol});
}

function finalizeStock(raw){
  const price=raw.price||0;
  const chgPct=raw.changePct||0;
  const sma20=raw.sma20 || price*(1 - Math.sign(chgPct||1)*0.004);
  const sma50=raw.sma50 || price*(1 - Math.sign(chgPct||1)*0.010);
  const sma200=raw.sma200 || price*(1 - Math.sign(chgPct||1)*0.025);
  const rsi=raw.rsi || clamp(50 + (chgPct*4),15,85);
  const volume=raw.volume || raw.vol || 0;
  const above=(price>sma20?1:0)+(price>sma50?1:0)+(price>sma200?1:0);
  const E=clamp(Math.abs(chgPct)/5 + ((rsi>70||rsi<30)?0.18:0),0,1);
  const S1=above/3;
  const R=clamp((Math.abs(chgPct)/8) + (rsi>70?0.34:rsi<30?0.40:0.12),0,1);
  const Support=clamp(above/3*0.65 + (volume>2e6?0.22:0.08),0,1);
  const Stability=clamp(0.48 + (price>sma200?0.18:-0.12) + (above/3)*0.16,0,1);
  const nerva=noiseFilter(NERVA.classify({E,S:S1,R,Support,Stability}),price,chgPct,rsi);
  return {
    sym:raw.sym,name:raw.name||raw.sym,price,chgPct,sma20,sma50,sma200,rsi,vol:volume,
    above,bias:price>sma50?'LONG':'SHORT',nerva
  };
}

function ingestLiveStocks(defs,raw=[]){

      sma200:src.sma200,

}

function scoreRing(score,size,label,tip){

    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#13263c" stroke-width="6" />
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${fill} ${c-fill}" stroke-dashoffset="${c/4}" />
      <text x="${size/2}" y="${size/2+1}" fill="${color}" font-size="${size>80?20:16}" font-weight="800" text-anchor="middle" dominant-baseline="middle" font-family="${M}">${score}</text>

  </div>`;
}

function blochSVG(bl,size,color){

  const px=cx + bl.x*r, py=cy - bl.z*r;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><radialGradient id="rg-${size}" cx="38%" cy="28%"><stop offset="0%" stop-color="#23476d" stop-opacity=".55" /><stop offset="100%" stop-color="#07111d" stop-opacity="1" /></radialGradient></defs>
    <ellipse cx="${cx}" cy="${cy}" rx="${r}" ry="${r*.32}" fill="none" stroke="#2b5b87" stroke-width="1" stroke-dasharray="3,2" opacity=".65" />
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#rg-${size})" stroke="#2f6fa5" stroke-width="1.3" opacity=".9" />
    <line x1="${cx}" y1="${cy-r}" x2="${cx}" y2="${cy+r}" stroke="#2b5b87" stroke-width=".8" stroke-dasharray="4,3" opacity=".55" />
    <line x1="${cx-r}" y1="${cy}" x2="${cx+r}" y2="${cy}" stroke="#2b5b87" stroke-width=".8" stroke-dasharray="4,3" opacity=".55" />
    <text x="${cx}" y="${cy-r-8}" fill="${C.green}" font-size="7" text-anchor="middle" font-family="${M}">|COMMIT⟩</text>
    <text x="${cx}" y="${cy+r+11}" fill="${C.red}" font-size="7" text-anchor="middle" font-family="${M}">|AVOID⟩</text>
    <line x1="${cx}" y1="${cy}" x2="${px}" y2="${py}" stroke="${color}" stroke-width="2.2" opacity=".95" />
    <circle cx="${px}" cy="${py}" r="7" fill="${color}" opacity=".12"><animate attributeName="r" values="5;10;5" dur="2.6s" repeatCount="indefinite" /></circle>
    <circle cx="${px}" cy="${py}" r="3.2" fill="${color}" opacity=".95"><animate attributeName="opacity" values="1;.55;1" dur="2.6s" repeatCount="indefinite" /></circle>
  </svg>`;
}
function miniBloch(bl,size,color){
  const cx=size/2, cy=size/2, r=size*0.36;
  const px=cx + bl.x*r, py=cy - bl.z*r;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2b5b87" stroke-width=".8" opacity=".6" />
    <line x1="${cx}" y1="${cy}" x2="${px}" y2="${py}" stroke="${color}" stroke-width="1.5" />
    <circle cx="${px}" cy="${py}" r="2.8" fill="${color}" opacity=".9" />
  </svg>`;
}

function sectorRows(sorted){

    const width=(Math.abs(val)/max)*100;
    const positive=val>=0;
    return `<div style="display:grid;grid-template-columns:34px 1fr 48px;gap:8px;align-items:center;margin-bottom:8px">

      </div>
      <div class="mono" style="font-size:11px;text-align:right;color:${positive?C.green:C.red}">${pct(val)}</div>

          <section style="display:grid;grid-template-columns:340px minmax(0,1fr);gap:12px;align-items:start">
            <div class="card" style="padding:14px;background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01))">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="section-title">Sector heatmap</div><div class="mono small">spread ${mkt.spread.toFixed(2)}%</div></div>
              ${sectorRows(sorted)}
            </div>
            <div class="card" style="padding:14px">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px">
                <div class="section-title">Opportunity surface</div>
                <div style="display:flex;gap:8px;border:1px solid ${C.border};border-radius:10px;overflow:hidden">
                  <button class="btn ${tab==='portfolio'?'active':''}" style="border:none;border-radius:0" onclick="setTab('portfolio')">Portfolio</button>
                  <button class="btn ${tab==='universe'?'active':''}" style="border:none;border-radius:0" onclick="setTab('universe')">Universe</button>
                </div>
              </div>
              <div style="display:grid;grid-template-columns:54px 1fr 70px 58px 42px 108px 34px;gap:8px;padding:0 10px 8px;border-bottom:1px solid ${C.border};font-size:10px;color:${C.dim};letter-spacing:1.3px" class="mono">
                <span>SYM</span><span>NAME</span><span style="text-align:right">PRICE</span><span style="text-align:right">CHG%</span><span style="text-align:right">RSI</span><span style="text-align:right">STATE</span><span style="text-align:right">NQ</span>
              </div>
              ${tableRows}
            </div>
          </section>
          <section style="display:grid;grid-template-columns:1.2fr .8fr;gap:12px">
            <div class="card" style="padding:14px">
              <div class="section-title" style="margin-bottom:10px">Terminal analysis</div>
              <div style="font-size:14px;color:${C.mid};line-height:1.8">
                <strong style="color:${dc}">${mktR.decision}</strong> state with <span class="mono">${Math.round(mktR.coherence*100)}%</span> coherence and <span class="mono">${Math.round(mktR.entropy*100)}%</span> entropy. ${regime}. Execution reads <span class="mono" style="color:${colorForScore(execS)}">${execS}/100</span>, so entries should respect market internals rather than price alone.
                ${isLive ? ` Data source: <span class="mono" style="color:${C.brand}">${apiSource}</span>.` : ` Simulation fallback is active because the live feed was unavailable.`}
              </div>
            </div>
            <div class="card" style="padding:14px">
              <div class="section-title" style="margin-bottom:10px">Score decomposition</div>
              ${decomp}
              <div style="margin-top:10px;padding-top:10px;border-top:1px solid ${C.border};display:flex;justify-content:space-between;align-items:center"><span class="small">Weighted market quality</span><span class="mono" style="font-size:16px;color:${colorForScore(mktR.score)};font-weight:800">${mktR.score} / 100</span></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>`;
}

function catCard(title,icon,score,items){
  const c=colorForScore(score);
  return `<div class="card" style="padding:10px 12px;background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c};opacity:.75"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="small mono" style="font-size:10px;letter-spacing:1.5px"><span style="color:${C.dim};margin-right:4px">${icon}</span>${title}</div><div class="mono" style="font-size:18px;color:${c};font-weight:700">${score}</div></div>${items.map(([l,v,cc])=>`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:${C.mid}"><span style="color:${C.dim}">${l}</span><span style="color:${cc||C.txt}">${v}</span></div>`).join('')}</div>`;
}

function startTicker(){
  const el=document.getElementById('ticker-inner');
  if(!el||!S.mkt) return;
  const items=[
    {sym:'SPY',value:`$${fp(S.mkt.spy.price)}`,chg:S.mkt.spy.chgPct},
    {sym:'QQQ',value:`$${fp(S.mkt.qqq.price)}`,chg:S.mkt.qqq.chgPct},
    {sym:'VIX',value:S.mkt.vix.level.toFixed(2),chg:S.mkt.vix.changePct},
    {sym:'10Y',value:`${S.mkt.macro.tenYear.yield.toFixed(2)}%`,chg:0},
    {sym:'DXY',value:S.mkt.macro.dxy.level.toFixed(2),chg:0},
    ...S.port.map(s=>({sym:s.sym,value:`$${fp(s.price)}`,chg:s.chgPct,tag:s.nerva.decision.slice(0,3)})),
    ...SECTOR_ORDER.map(sym=>({sym,value:pct(S.mkt.sectors[sym]||0),chg:S.mkt.sectors[sym]||0}))
  ];
  const trip=[...items,...items,...items];
  el.innerHTML=trip.map(item=>`<div style="width:146px;padding:0 12px;display:flex;align-items:center;gap:8px"><span style="color:${C.dim}">${item.sym}</span><span style="color:${item.chg>=0?C.green:C.red}">${item.value}</span>${item.tag?`<span style="font-size:9px;color:${C.brand}">${item.tag}</span>`:''}</div>`).join('');
  let x=0;
  const step=()=>{ if(!document.body.contains(el)) return; x=(x+0.65)% (items.length*146); el.style.transform=`translateX(${-x}px)`; requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

function setMode(mode){S.mode=mode; recompute();}
function setTab(tab){S.tab=tab; renderAll();}
function toggleExp(sym){S.exp=S.exp===sym?null:sym; renderAll();}

function recompute(){
  const params=marketParams(S.mkt);
  S.mktR=NERVA.classify(params);
  S.cats=categoryScores(S.mkt);
  S.execS=execScore(S.mkt.exec);
  renderAll();
}

function renderAll(){
  if(!S.mkt){
    document.getElementById('root').innerHTML=`<div class="loading"><div class="mono" style="font-size:14px;color:${C.brand};letter-spacing:3px;font-weight:700">◉ NERVA MARKET v5.0</div><div class="mono" style="font-size:11px;color:${C.dim};letter-spacing:2px">INITIALIZING QUANTUM ENGINE...</div></div>`;
    return;
  }
  document.getElementById('root').innerHTML=appHTML();
  const rb=document.getElementById('refresh-btn'); if(rb) rb.onclick=()=>doRefresh(true);
  startTicker();
}

async function doRefresh(manual=false){
  if(manual){ document.getElementById('refresh-btn')?.setAttribute('disabled','disabled'); }
  const live=await fetchLiveData();
  if(live.ok){
    S.mkt=live.market;
    S.port=ingestLiveStocks(PORT_DEFS,live.portfolio);
    S.uni=ingestLiveStocks(UNIVERSE_DEFS,live.universe);
    S.isLive=true;
    S.apiSource=live.source;
    S.lastError=null;
    S.lastGoodAt=Date.now();
    S.staleData=false;
  }else if(S.lastGoodAt){
    S.staleData=true;
    S.lastError=live.error;
    S.isLive=true;
  }else{
    S.mkt=simulateMarket(++S.tick);
    S.port=PORT_DEFS.map((d,i)=>buildStockFromDef(d,i,S.tick));
    S.uni=UNIVERSE_DEFS.map((d,i)=>buildStockFromDef(d,i+100,S.tick));
    S.isLive=false;
    S.apiSource='simulation';
    S.lastError=live.error || 'Live data unavailable';
  }
  S.secAgo=0;
  recompute();
  if(manual){ document.getElementById('refresh-btn')?.removeAttribute('disabled'); }
}

setInterval(()=>{
  S.secAgo++;
  const label=document.getElementById('sec-ago');
  if(label) label.textContent=`${S.secAgo}s ago`;
},1000);
setInterval(()=>{ doRefresh(false); },POLL_MS);

buildGuide();
doRefresh(false);
</script>
</body>
</html>
