const TT=document.getElementById('tt-overlay');
let ttNode=null;
function showTT(node,e){
  const tip=node.getAttribute('data-tip');
  if(!tip) return;
  ttNode=node; TT.textContent=tip; TT.classList.add('show'); moveTT(e);
}
function moveTT(e){
  if(!ttNode) return;
  const pad=14; const vw=window.innerWidth; const vh=window.innerHeight;
  const r=TT.getBoundingClientRect();
  let x=e.clientX+pad, y=e.clientY+pad;
  if(x+r.width+12>vw) x=e.clientX-r.width-pad;
  if(y+r.height+12>vh) y=e.clientY-r.height-pad;
  if(x<8) x=8; if(y<8) y=8;
  TT.style.transform=`translate(${x}px,${y}px)`;
}
function hideTT(){ ttNode=null; TT.classList.remove('show'); }
document.addEventListener('mouseover',e=>{ const n=e.target.closest('.tt'); if(n) showTT(n,e); });
document.addEventListener('mousemove',e=>{ if(ttNode) moveTT(e); });
document.addEventListener('mouseout',e=>{ if(!ttNode) return; const to=e.relatedTarget; if(to && ttNode.contains && ttNode.contains(to)) return; const still=e.target.closest && e.target.closest('.tt'); if(still===ttNode) hideTT(); });

// ── NERVA QUANTUM ENGINE ──
const NERVA={
  bloch(t,p){const a=Math.cos(t/2),b=Math.sin(t/2);return{a,b,x:Math.sin(t)*Math.cos(p),y:Math.sin(t)*Math.sin(p),z:Math.cos(t)};},
  density(pr){
    const t=Math.PI*(1-(pr.S*.3+pr.Support*.3+pr.Stability*.25+(1-pr.R)*.15));
    const p=2*Math.PI*pr.E;
    const st=this.bloch(t,p);
    const r00=st.a**2;
    const coh=Math.sqrt((st.a*(Math.sin(t/2))*Math.cos(p))**2+(st.a*(Math.sin(t/2))*Math.sin(p))**2);
    return{r00,coh,st};
  },
  entropy(dm){
    const det=dm.r00*(1-dm.r00)-dm.coh**2;
    const disc=Math.sqrt(Math.max(0,.25-det));
    const l1=Math.max(1e-10,.5+disc),l2=Math.max(1e-10,.5-disc);
    const raw=-(l1*Math.log2(l1)+l2*Math.log2(l2));
    return Math.min(1,Math.max(0,Math.max(raw,.05*(1-dm.coh))));
  },
  classify(pr){
    const dm=this.density(pr);
    const ent=this.entropy(dm);
    const{coh,r00,st}=dm;
    let d,z,c;
    if(coh>.4&&r00>.65&&ent<.4){d='COMMIT';z='TRADE';c=C.grn;}
    else if(coh>.3&&r00>.5&&ent<.6){d='HOLD';z='CAUTION';c=C.yel;}
    else if(ent>.7||coh<.15){d='WAIT';z='NO TRADE';c=C.mid;}
    else if(r00<.35&&coh>.3){d='ESCALATE';z='HEDGE';c=C.orn;}
    else if(ent>.8&&coh<.1){d='TOXIC';z='AVOID';c=C.red;}
    else{d='HOLD';z='CAUTION';c=C.yel;}
    return{decision:d,zone:z,color:c,entropy:ent,coherence:coh,commitProb:r00,bloch:st,score:Math.round((r00*.35+coh*.35+(1-ent)*.3)*100)};
  }
};

function genStock(def,i,tick){
  const r=rng(i*7919+tick*31),n=()=>(r()-.5)*.03;
  const w=Math.sin((Date.now()+i*1e6)/5e6);
  const price=def.bp*(1+n()*2+w*.02),chgPct=n()*4+w*.5,vol=500000+r()*5e6;
  const sma20=price*(1+(r()-.55)*.04),sma50=price*(1+(r()-.52)*.07),sma200=price*(1+(r()-.48)*.12);
  const rsi=40+r()*30+w*10;
  const above=(price>sma20?1:0)+(price>sma50?1:0)+(price>sma200?1:0);
  const E=Math.min(1,Math.max(0,Math.abs(chgPct)/5+(rsi>70||rsi<30?.3:0)));
  const S=above/3,R=Math.min(1,Math.max(0,(rsi>70?.7:rsi<30?.7:.2)+Math.abs(chgPct)/8));
  const Support=Math.min(1,Math.max(0,above/3*.6+(vol>2e6?.3:.1)+.1));
  const Stability=Math.min(1,Math.max(0,.5+(price>sma200?.2:-.2)+w*.1));
  const nerva=NERVA.classify({E,S,R,Support,Stability});
  // Apply noise filter before returning
  const nervaFiltered = applyNoiseFilter(nerva, price, chgPct, rsi);
  return{...def,price,chgPct,vol,sma20,sma50,sma200,rsi,above,nerva:nervaFiltered,bias:price>sma50?'LONG':'SHORT'};
}

// ── NOISE FILTER ──
// Gates that must all pass before COMMIT is allowed
// Prevents false signals on volatile/speculative names
function applyNoiseFilter(nerva, price, chgPct, rsi) {
  const reasons = [];
  if (price < 8)                    reasons.push('Low price (<$8)');
  if (Math.abs(chgPct) > 5)         reasons.push('High volatility (>5% move)');
  if (rsi > 75)                     reasons.push('RSI overbought (>75)');
  if (rsi < 25)                     reasons.push('RSI oversold (<25)');

  if (reasons.length > 0 && nerva.decision === 'COMMIT') {
    return {
      ...nerva,
      decision: 'HOLD',
      zone: 'CAUTION',
      color: '#ffcc44',
      filtered: true,
      filterReasons: reasons,
    };
  }
  return { ...nerva, filtered: false, filterReasons: [] };
}

function safeNum(v,f=0){const n=Number(v);return Number.isFinite(n)?n:f;}
function inferName(sym){return ({VGT:'Vanguard Information Technology ETF',GDX:'VanEck Gold Miners ETF',QBTS:'D-Wave Quantum',VYM:'Vanguard High Dividend Yield ETF',XYZ:'Block Inc.'})[sym]||sym;}
function regimeFromMarket(d){
  const up50=d.spy.price>d.spy.sma50,up200=d.spy.price>d.spy.sma200;
  const breadthStrong=d.breadth.a20>55&&d.breadth.ad>1,breadthWeak=d.breadth.a20<40||d.breadth.ad<0.9;
  if(up50&&up200&&breadthStrong&&d.vix.level<22)return 'Strong Uptrend';
  if(up50&&up200&&d.spread>0)return 'Orderly Uptrend';
  if(!up50&&!up200&&breadthWeak)return 'Confirmed Downtrend';
  if(d.vix.level>25||d.spread<-0.7)return 'Stress / Distribution';
  return 'Chop / Transition';
}
function computeTrust(d,mktR,execS){
  const score=safeNum(mktR.score,50);
  const ad=safeNum(d.breadth.ad,1);
  const vix=safeNum(d.vix.level,16);
  const spread=safeNum(d.spread,0);
  const ex=safeNum(execS,50);
  const base=score*0.45+ex*0.2+Math.max(0,Math.min(100,ad*45))*0.15+Math.max(0,Math.min(100,(100-vix*2.2)))*0.1+Math.max(0,Math.min(100,50+spread*20))*0.1;
  return Math.max(0,Math.min(100,Math.round(base)));
}
function enrichStock(raw,def,i,tick,mkt){
  const s=genStock(def||{sym:raw.sym,name:inferName(raw.sym),bp:Math.max(1,safeNum(raw.price,10)||10)},i,tick);

  const price=useOrFallback(raw.price,s.price),chgPct=safeNum(raw.changePct,s.chgPct),rsi=useOrFallback(raw.rsi,s.rsi||50);
  const sma50=useOrFallback(raw.sma50,price*0.97),sma200=useOrFallback(raw.sma200,price*0.93),sma20=useOrFallback(raw.sma20,price*(price>=sma50?0.995:1.005));
  const volume=useOrFallback(raw.volume,s.vol||0);
  const above=(price>sma20?1:0)+(price>sma50?1:0)+(price>sma200?1:0);
  const E=Math.min(1,Math.max(0,Math.abs(chgPct)/5+((rsi>70||rsi<30)?0.25:0)+(mkt.vix.level>22?0.12:0)));
  const S=above/3;
  const R=Math.min(1,Math.max(0,Math.abs(chgPct)/8+(rsi>75||rsi<25?0.35:0)+(mkt.vix.level>25?0.2:0.05)));
  const Support=Math.min(1,Math.max(0,0.2+above/3*0.55+(Math.abs(chgPct)<2?0.15:0)+(mkt.spread>0?0.1:0)));
  const Stability=Math.min(1,Math.max(0,0.4+(price>sma200?0.2:-0.15)+(mkt.breadth.ad>1?0.15:0)+(mkt.macro.fomc>7?0.1:0)));
  const rawNerva=NERVA.classify({E,S,R,Support,Stability});
  const nerva=applyNoiseFilter(rawNerva,price,chgPct,rsi);
  const dataWeak = Number(raw.rsi)<=1 || Number(raw.sma50)<=0 || Number(raw.sma200)<=0 || Number(raw.volume)<=0;
  const mtf=((chgPct>0?1:0)+(price>sma50?1:0)+(price>sma200?1:0))/3;
  const sizeDown = nerva.coherence < 0.4 || nerva.entropy > 0.5;
  return {...s,...raw,name:def?.name||inferName(raw.sym),price,chgPct,rsi,sma20,sma50,sma200,volume,above,nerva,bias:price>sma50?'LONG':'SHORT',mtf,dataWeak,sizeDown};
}

function startTicker(){
  const{mkt,port}=S;
  if(!mkt)return;
  const items=[
    {sym:'SPY',p:mkt.spy.price,ch:mkt.spy.chgPct||0},
    {sym:'QQQ',p:mkt.qqq.price,ch:mkt.qqq.chgPct||0},
    {sym:'VIX',p:mkt.vix.level,ch:mkt.vix.chgPct||0,raw:true},
    {sym:'10Y',p:mkt.macro.tny.y,ch:0,pct:true},
    {sym:'DXY',p:mkt.macro.dxy.l,ch:0,raw:true},
    ...port.map(s=>({sym:s.sym,p:s.price,ch:s.chgPct,nc:s.nerva.color,nd:s.nerva.decision.slice(0,3)})),
    ...(mkt.sorted||[]).slice(0,5).map(([s,v])=>({sym:s,ch:v,p:null})),
  ];
  const triple=[...items,...items,...items];
  const el=document.getElementById('ticker-inner');
  if(!el)return;
  const iW=132;
  el.innerHTML=triple.map(t=>{
    const neg=t.ch<0,vc=neg?C.red:C.grn;
    const fmt=t.pct?t.p.toFixed(2)+'%':t.raw?t.p.toFixed(2):t.p?'$'+fp(t.p):null;
    return`<div style="display:inline-flex;align-items:center;gap:5px;padding:0 11px;border-right:1px solid ${C.border}20;height:26px;min-width:${iW}px">
<span style="font-size:8px;color:${t.nc||C.acc};font-weight:bold">${t.sym}</span>
${t.nd?`<span style="font-size:6px;color:${t.nc};opacity:.7">${t.nd}</span>`:''}
${fmt?`<span style="font-size:8px;color:${C.txt}">${fmt}</span>`:''}
<span style="font-size:7.5px;color:${vc}">${neg?'▼':'▲'}${Math.abs(t.ch).toFixed(2)}%</span>
</div>`;}).join('');
  const total=items.length*iW;
  if(window._tickerIv)clearInterval(window._tickerIv);
  window._tickerIv=setInterval(()=>{
    tickerOffset-=0.55;
    const el2=document.getElementById('ticker-inner');
    if(el2)el2.style.transform=`translateX(${tickerOffset%total}px)`;
  },25);
}

  const ms=Math.min(100,Math.max(0,Math.round((Object.values(d.sectors).filter(v=>v>0).length/11)*55+Math.max(0,Math.min(45,d.spread*18))+((d.spy.chg5d||0)>0?4:0))));
  const mc=Math.min(100,Math.max(0,Math.round((d.macro.fed==='dovish'?42:25)+(d.macro.tny.y<4.5?20:10)+(d.macro.fomc>7?20:5)+(d.macro.dxy.t==='weak'?14:9))));
  S={...S,mkt:d,mktR:res,port:livePort,uni:rankedUni,cats:{v:vs,t:ts,b:bs,m:ms,mc},execS:ex,secAgo:0,tick:S.tick+1};
  renderAll();
  }catch(err){
    console.error('NERVA refresh error:',err);
    S.isLive=false;
    const d2=genMarket(S.tick);
    const rawP2=mktParams(d2);
    const res2=NERVA.classify(rawP2);
    const pd2=PDEFS.map((s,i)=>genStock(s,i,S.tick));
    const ud2=UDEFS.map((s,i)=>genStock(s,i+100,S.tick)).sort((a,b)=>(b.nerva.coherence*.4+b.nerva.commitProb*.35+(1-b.nerva.entropy)*.25)-(a.nerva.coherence*.4+a.nerva.commitProb*.35+(1-a.nerva.entropy)*.25));
    const vl2=d2.vix.level;
    const vs2=Math.min(100,Math.max(0,Math.round((1-Math.min(1,(vl2-10)/25))*70+(d2.vix.trend5d<0?20:0)+(d2.putCall.ratio<1?10:0))));
    const ts2b=Math.min(100,Math.max(0,Math.round(rawP2.S*100)));
    const bs2=Math.min(100,Math.max(0,Math.round((d2.breadth.a20+d2.breadth.a50+d2.breadth.a200)/3)));
    const ms2=Math.min(100,Math.max(0,Math.round((Object.values(d2.sectors).filter(v=>v>0).length/11)*60+Math.min(40,d2.spread*20))));
    const mc2=Math.min(100,Math.max(0,Math.round(25+(d2.macro.tny.y<4.5?20:10)+(d2.macro.fomc>7?20:5))));
    const ex2=Math.round(((d2.exec.breakoutRetention||d2.exec.br||.5)*.3+(d2.exec.trendReliability||d2.exec.rt||.5)*.25+(d2.exec.pullbackBid||d2.exec.pb||.5)*.25+(d2.exec.followThrough||d2.exec.ft||.5)*.2)*100);
    S={...S,mkt:d2,mktR:res2,port:pd2,uni:ud2,cats:{v:vs2,t:ts2b,b:bs2,m:ms2,mc:mc2},execS:ex2,secAgo:0,tick:S.tick+1};
    renderAll();
  }
}

// ── CLOCK ──
setInterval(()=>{S.secAgo++;const el=document.getElementById('sec-ago');if(el)el.textContent=S.secAgo+'s ago';},1000);
setInterval(()=>doRefresh(),45000);

doRefresh();
</script>
