<script>
const C={bg:'#040c18',panel:'#091524',border:'#1e3548',dim:'#4a6a85',mid:'#6a90a8',txt:'#a0c4d8',bright:'#d0e8f5',acc:'#4a9eff',accd:'#1a5acc',grn:'#00e891',yel:'#ffcc44',red:'#ff3d5a',orn:'#ff7733'};
const TT=document.getElementById('tt-overlay'); let ttNode=null;
function showTT(node,e){const tip=node.getAttribute('data-tip'); if(!tip) return; ttNode=node; TT.textContent=tip; TT.classList.add('show'); moveTT(e);}
function moveTT(e){if(!ttNode) return; const pad=14,vw=innerWidth,vh=innerHeight,r=TT.getBoundingClientRect(); let x=e.clientX+pad,y=e.clientY+pad; if(x+r.width+12>vw) x=e.clientX-r.width-pad; if(y+r.height+12>vh) y=e.clientY-r.height-pad; if(x<8)x=8; if(y<8)y=8; TT.style.transform=`translate(${x}px,${y}px)`;}
function hideTT(){ttNode=null; TT.classList.remove('show')}
document.addEventListener('mouseover',e=>{const n=e.target.closest('.tt'); if(n) showTT(n,e)});
document.addEventListener('mousemove',e=>{if(ttNode) moveTT(e)});
document.addEventListener('mouseout',e=>{if(!ttNode) return; const from=e.target.closest&&e.target.closest('.tt'); const to=e.relatedTarget&&e.relatedTarget.closest?e.relatedTarget.closest('.tt'):null; if(from===ttNode&&to!==ttNode) hideTT()});
document.addEventListener('scroll',hideTT,true);

const TIPS={
  status:`DATA STATUS\nLIVE = all core symbols fetched and indicators computed.\nPARTIAL = core prices loaded but some indicators are synthetic.\nDEGRADED = proxy fell back heavily or key symbols missing.`,
  trust:`TRUST\nConfidence layer on top of market quality.\nUse this for sizing. High trust lets you press. Low trust means tactical only.`,
  drift:`HOURLY DRIFT\nSimple answer to one question:\nIs the tape improving, stable, or decaying versus the last few checks?`,
  volatility:`VOLATILITY\nStress / fear layer. High volatility = smaller size and less trust.`,
  trend:`TREND\nReal price vs real 20d / 50d / 200d structure.`,
  breadth:`BREADTH\nHow many stocks are actually participating in the move.`,
  momentum:`MOMENTUM\nShort-horizon thrust from sectors, spread, and NH/NL.`,
  macro:`MACRO\nRates, dollar, Fed stance, and FOMC timing.`,
  mq:`MARKET QUALITY\nHow tradable the tape is right now. 80+ strong, 60-79 tactical, below 60 defensive.`,
  ex:`EXECUTION\nAre setups actually working after entry? Low execution means smaller size.`,
  state:`NERVA DECISION STATE\nCOMMIT / HOLD / WAIT / ESCALATE / TOXIC from the quantum engine.`,
  badges:`BADGES\nFLT = filter tripped.\nDATA = some indicators missing or synthetic.\nSIZE = tactical sizing only.`,
  table:`PORTFOLIO\nOnly live core names stay here in v7.2. The universe table is removed on purpose to protect trust.`,
  heat:`SECTOR HEATMAP\nShows live sector rotation from the 11 SPDR sectors.`
};

const CORE_PORT=[{sym:'VGT',name:'Vanguard Info Tech',bp:715},{sym:'GDX',name:'VanEck Gold Miners',bp:82},{sym:'QBTS',name:'D-Wave Quantum',bp:15.6},{sym:'VYM',name:'Vanguard Hi-Div',bp:147}];
const SECS=['XLK','XLF','XLE','XLV','XLI','XLY','XLP','XLU','XLB','XLRE','XLC'];
function safeNum(v,f=0){const n=Number(v); return Number.isFinite(n)?n:f}
function fp(p){return p<20?p.toFixed(2):p<200?p.toFixed(1):p.toFixed(0)}
function fv(v){return v>1e6?(v/1e6).toFixed(1)+'M':(v/1e3).toFixed(0)+'K'}

const NERVA={
  bloch(t,p){const a=Math.cos(t/2),b=Math.sin(t/2);return{a,b,x:Math.sin(t)*Math.cos(p),y:Math.sin(t)*Math.sin(p),z:Math.cos(t)};},
  density(pr){const t=Math.PI*(1-(pr.S*.3+pr.Support*.3+pr.Stability*.25+(1-pr.R)*.15)),p=2*Math.PI*pr.E,st=this.bloch(t,p),r00=st.a**2,coh=Math.sqrt((st.a*(Math.sin(t/2))*Math.cos(p))**2+(st.a*(Math.sin(t/2))*Math.sin(p))**2); return{r00,coh,st};},
  entropy(dm){const det=dm.r00*(1-dm.r00)-dm.coh**2,disc=Math.sqrt(Math.max(0,.25-det)),l1=Math.max(1e-10,.5+disc),l2=Math.max(1e-10,.5-disc),raw=-(l1*Math.log2(l1)+l2*Math.log2(l2)); return Math.min(1,Math.max(0,Math.max(raw,.05*(1-dm.coh))));},
  classify(pr){const dm=this.density(pr),ent=this.entropy(dm),{coh,r00,st}=dm; let d,z,c; if(coh>.4&&r00>.65&&ent<.4){d='COMMIT';z='TRADE';c=C.grn}else if(coh>.3&&r00>.5&&ent<.6){d='HOLD';z='CAUTION';c=C.yel}else if(ent>.7||coh<.15){d='WAIT';z='NO TRADE';c=C.mid}else if(r00<.35&&coh>.3){d='ESCALATE';z='HEDGE';c=C.orn}else if(ent>.8&&coh<.1){d='TOXIC';z='AVOID';c=C.red}else{d='HOLD';z='CAUTION';c=C.yel} return{decision:d,zone:z,color:c,entropy:ent,coherence:coh,commitProb:r00,bloch:st,score:Math.round((r00*.35+coh*.35+(1-ent)*.3)*100)};}
};

function applyNoiseFilter(nerva, price, chgPct, rsi) {
  const reasons=[];
  if(price<8) reasons.push('Low price');
  if(Math.abs(chgPct)>5) reasons.push('High vol');
  if(rsi>75) reasons.push('RSI high');
  if(rsi<25) reasons.push('RSI low');
  if(reasons.length && nerva.decision==='COMMIT') return {...nerva,decision:'HOLD',zone:'CAUTION',color:C.yel,filtered:true,filterReasons:reasons};
  return {...nerva,filtered:false,filterReasons:[]};
}

function genMarket(tick){
  const n=()=>(Math.random()-.5)*.02,w=Math.sin(Date.now()/5e6),spyP=568+w*3+n()*10,vixL=16.8-w*2+Math.random()*3,sp={}; SECS.forEach(s=>{sp[s]=(Math.random()-.3)*2.5;});
  const sorted=Object.entries(sp).sort((a,b)=>b[1]-a[1]), spread=sorted.slice(0,3).reduce((s,e)=>s+e[1],0)/3-sorted.slice(-3).reduce((s,e)=>s+e[1],0)/3;
  return {spy:{price:spyP,sma20:spyP-2+n()*5,sma50:spyP-5+n()*8,sma200:spyP-20+n()*10,rsi:55+w*15+Math.random()*10,chgPct:n()*3,chg5d:n()*5,chg20d:n()*8},
    qqq:{price:487+w*4,sma50:482+n()*8,chgPct:n()*3,chg5d:n()*6,chg20d:n()*9},vix:{level:vixL,trend5d:-.3+n()*1.5,chgPct:n()*4},vvix:{level:82+Math.random()*15},putCall:{ratio:.85+n()*.3},
    breadth:{a20:62+Math.random()*20,a50:55+Math.random()*20,a200:58+Math.random()*18,ad:1.2+n()*.8,nhNl:2.1+n()*1.5},sectors:sp,sorted,spread,
    macro:{tny:{y:4.32+n()*.3,t:w>0?'rising':'falling'},dxy:{l:104.2+n()*2,t:w>.3?'str':'weak'},fed:'neutral',fomc:Math.floor(Math.random()*30)+2},
    exec:{breakoutRetention:.6+Math.random()*.3,trendReliability:.55+Math.random()*.35,pullbackBid:.5+Math.random()*.4,followThrough:.45+Math.random()*.4},
    dataStatus:'DEGRADED', source:'simulation'
  };
}

async function fetchLiveData(){
  try{
    const r=await fetch('/api/market',{signal:AbortSignal.timeout(8000)});
    if(!r.ok) return null;
    const d=await r.json();
    if(d.error) return null;
    const sp=d.sectors||{}, sorted=Object.entries(sp).sort((a,b)=>b[1]-a[1]), spread=sorted.length>=6?sorted.slice(0,3).reduce((s,e)=>s+e[1],0)/3-sorted.slice(-3).reduce((s,e)=>s+e[1],0)/3:0;
    const portfolio = Array.isArray(d.portfolio)?d.portfolio:[];
    const keyCore = ['SPY','QQQ','VIX',...SECS,'VGT','GDX','QBTS','VYM'];
    const quoteErrors = Array.isArray(d.quoteErrors)?d.quoteErrors:[];
    const fetchedCount = safeNum(d.symbolsFetched, 0);
    const missingCore = Math.max(0, keyCore.length - fetchedCount);
    let dataStatus = 'LIVE';
    if (missingCore > 0 || quoteErrors.length > 0) dataStatus = 'PARTIAL';
    if (!portfolio.length || !Object.keys(sp).length) dataStatus = 'DEGRADED';
    return {
      spy:{price:d.spy.price,sma20:d.spy.sma20||d.spy.price*.99,sma50:d.spy.sma50||d.spy.price*.97,sma200:d.spy.sma200||d.spy.price*.95,rsi:d.spy.rsi||55,chgPct:d.spy.changePct||0,chg5d:d.spy.chg5d||0,chg20d:d.spy.chg20d||0},
      qqq:{price:d.qqq.price,sma50:d.qqq.sma50||d.qqq.price*.98,chgPct:d.qqq.changePct||0,chg5d:d.qqq.chg5d||0,chg20d:d.qqq.chg20d||0},
      vix:{level:d.vix.level||16,trend5d:d.vix.changePct||0,chgPct:d.vix.changePct||0},
      vvix:{level:d.vvix?.level||85}, putCall:{ratio:d.putCall?.ratio||.85},
      breadth:{a20:d.breadth?.above20d||60,a50:d.breadth?.above50d||55,a200:d.breadth?.above200d||55,ad:d.breadth?.advDeclineRatio||1.1,nhNl:d.breadth?.nhNl||1.5},
      sectors:sp,sorted,spread,
      macro:{tny:{y:d.macro.tenYear?.yield||4.3,t:d.macro.tenYear?.trend||'neutral'},dxy:{l:d.macro.dxy?.level||104,t:d.macro.dxy?.trend||'neutral'},fed:d.macro.fedStance||'neutral',fomc:d.macro.fomcDays||15},
      exec:{breakoutRetention:d.exec?.breakoutRetention||.65,trendReliability:d.exec?.trendReliability||.6,pullbackBid:d.exec?.pullbackBid||.55,followThrough:d.exec?.followThrough||.5,br:d.exec?.breakoutRetention||.65,rt:d.exec?.trendReliability||.6,pb:d.exec?.pullbackBid||.55,ft:d.exec?.followThrough||.5},
      rawPortfolio:portfolio, dataStatus, quoteErrors, source:d.source||'api'
    };
  }catch(e){return null;}
}

function mktParams(d){
  const vN=Math.max(0,Math.min(1,(safeNum(d.vix.level,16)-10)/30)),fU=d.macro.fomc<3?.9:d.macro.fomc<7?.6:.3;
  const E=vN*.6+fU*.4, S=(d.spy.price>d.spy.sma20?0.25:0)+(d.spy.price>d.spy.sma50?0.25:0)+(d.spy.price>d.spy.sma200?0.3:0)+(d.qqq.price>d.qqq.sma50?0.2:0);
  const rsi=safeNum(d.spy.rsi,55), rR=rsi>70?.7:rsi<30?.8:.2, vR=d.vix.level>25?.8:d.vix.level>20?.5:.2, R=vR*.4+rR*.3+Math.min(1,safeNum(d.putCall.ratio,.85))*.3;
  const bA=(safeNum(d.breadth.a20,55)+safeNum(d.breadth.a50,50)+safeNum(d.breadth.a200,50))/300,sP=Object.values(d.sectors).filter(v=>v>0).length/11;
  const Support=bA*.6+sP*.4,mS=d.macro.fed==='dovish'?.8:d.macro.fed==='neutral'?.6:.3,eBreak=safeNum(d.exec.breakoutRetention,d.exec.br),eTrend=safeNum(d.exec.trendReliability,d.exec.rt),ePull=safeNum(d.exec.pullbackBid,d.exec.pb),eFollow=safeNum(d.exec.followThrough,d.exec.ft),eA=(eBreak+eTrend+ePull+eFollow)/4;
  return {E,S,R,Support,Stability:mS*.4+eA*.6};
}
function regimeFromMarket(d){
  const up50=d.spy.price>d.spy.sma50,up200=d.spy.price>d.spy.sma200,breadthStrong=d.breadth.a20>55&&d.breadth.ad>1,breadthWeak=d.breadth.a20<40||d.breadth.ad<0.9;
  if(up50&&up200&&breadthStrong&&d.vix.level<22) return 'Strong Uptrend';
  if(up50&&up200&&d.spread>0) return 'Orderly Uptrend';
  if(!up50&&!up200&&breadthWeak) return 'Confirmed Downtrend';
  if(d.vix.level>25||d.spread<-0.7) return 'Stress / Distribution';
  return 'Chop / Transition';
}
function computeTrust(d,mktR,execS){
  const score=safeNum(mktR.score,50), ad=safeNum(d.breadth.ad,1), vix=safeNum(d.vix.level,16), spread=safeNum(d.spread,0), ex=safeNum(execS,50);
  const base=score*.45+ex*.2+Math.max(0,Math.min(100,ad*45))*.15+Math.max(0,Math.min(100,(100-vix*2.2)))*.1+Math.max(0,Math.min(100,50+spread*20))*.1;
  return Math.max(0,Math.min(100,Math.round(base)));
}
function enrichStock(raw,def,tick,mkt){
  const price=safeNum(raw.price,def.bp), chgPct=safeNum(raw.changePct,0), rsi=safeNum(raw.rsi,50);
  const sma20=safeNum(raw.sma20,price*(price>=safeNum(raw.sma50,price*.97)?0.995:1.005));
  const sma50=safeNum(raw.sma50,price*.97), sma200=safeNum(raw.sma200,price*.93), volume=safeNum(raw.volume,0);
  const above=(price>sma20?1:0)+(price>sma50?1:0)+(price>sma200?1:0), E=Math.min(1,Math.max(0,Math.abs(chgPct)/5+((rsi>70||rsi<30)?0.25:0)+(mkt.vix.level>22?0.12:0))), S=above/3, R=Math.min(1,Math.max(0,Math.abs(chgPct)/8+(rsi>75||rsi<25?0.35:0)+(mkt.vix.level>25?0.2:0.05))), Support=Math.min(1,Math.max(0,0.2+above/3*.55+(Math.abs(chgPct)<2?0.15:0)+(mkt.spread>0?0.1:0))), Stability=Math.min(1,Math.max(0,0.4+(price>sma200?0.2:-0.15)+(mkt.breadth.ad>1?0.15:0)+(mkt.macro.fomc>7?0.1:0)));
  const nerva=applyNoiseFilter(NERVA.classify({E,S,R,Support,Stability}),price,chgPct,rsi), dataWeak=Number(raw.rsi)<=0||Number(raw.sma50)<=0||Number(raw.sma200)<=0, sizeDown=nerva.coherence<.4||nerva.entropy>.5;
  return {...def,...raw,price,chgPct,rsi,sma20,sma50,sma200,volume,nerva,bias:price>sma50?'LONG':'SHORT',dataWeak,sizeDown};
}
function scoreRingSVG(score,sz,label){
  const s=Math.max(0,Math.min(100,safeNum(score,0))), r=(sz-16)/2, circ=2*Math.PI*r, fill=(s/100)*circ, c=s>=80?C.grn:s>=60?C.yel:C.red;
  return `<div style="text-align:center"><svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${C.panel}" stroke-width="5"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${c}" stroke-width="5" stroke-dasharray="${fill} ${circ-fill}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/><text x="${sz/2}" y="${sz/2+2}" fill="${c}" font-size="${sz>80?18:14}" font-weight="bold" text-anchor="middle" font-family="monospace" dominant-baseline="middle">${s}</text><text x="${sz/2}" y="${sz/2+14}" fill="${C.mid}" font-size="6" text-anchor="middle" font-family="monospace">/ 100</text></svg>${label?`<div style="color:${C.mid};font-size:7px;letter-spacing:1.5px;text-align:center;margin-top:-3px;">${label}</div>`:''}</div>`;
}
function barHTML(v,label){
  const safe=Math.max(0,Math.min(1,safeNum(v,0))), p=Math.round(safe*100), c=p>70?C.grn:p>45?C.yel:C.red;
  return `<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between;font-size:8px;color:${C.mid};margin-bottom:2px"><span>${label}</span><span style="color:${c}">${p}%</span></div><div style="height:3px;background:${C.bg};border-radius:2px;overflow:hidden"><div style="height:100%;width:${p}%;background:${c};border-radius:2px"></div></div></div>`;
}
function pulseData(){const raw=localStorage.getItem('nerva_drift_v72'); let arr=[]; try{arr=raw?JSON.parse(raw):[]}catch(e){arr=[]} return Array.isArray(arr)?arr:[];}
function savePulsePoint(mq,ex,trust){let arr=pulseData(); arr.push({t:Date.now(),mq,ex,trust}); if(arr.length>12) arr=arr.slice(-12); localStorage.setItem('nerva_drift_v72',JSON.stringify(arr));}
function driftSummary(history){
  if(history.length<2) return {label:'STABLE', color:C.mid, text:'Need more checks to judge tape drift.'};
  const recent=history.slice(-3), first=recent[0], last=recent[recent.length-1], delta=((last.mq+last.ex+last.trust)-(first.mq+first.ex+first.trust))/3;
  if(delta>4) return {label:'IMPROVING', color:C.grn, text:'Conditions are improving versus the last few checks.'};
  if(delta<-4) return {label:'DECAYING', color:C.red, text:'Conditions are degrading versus the last few checks.'};
  return {label:'STABLE', color:C.yel, text:'Conditions are roughly stable over recent checks.'};
}
function driftMini(history,w,h){
  if(!history.length) return `<div style="height:${h}px;display:flex;align-items:center;justify-content:center;color:${C.dim};font-size:7px">No drift history yet</div>`;
  const pad=8, xs=(i)=>pad+(i*(w-pad*2)/Math.max(1,history.length-1)), ys=(v)=>h-pad-((Math.max(0,Math.min(100,v))/100)*(h-pad*2));
  const line=(key)=>history.map((p,i)=>`${i===0?'M':'L'} ${xs(i)} ${ys(p[key])}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="${C.border}" stroke-width="1"/><path d="${line('mq')}" fill="none" stroke="${C.acc}" stroke-width="2"/><path d="${line('ex')}" fill="none" stroke="${C.yel}" stroke-width="2"/><path d="${line('trust')}" fill="none" stroke="${C.grn}" stroke-width="2"/></svg>`;
}
function dataStatusPill(status){ const map={LIVE:C.grn,PARTIAL:C.yel,DEGRADED:C.red}; const c=map[status]||C.mid; return `<span class="tt pill" data-tip="${TIPS.status}" style="color:${c};border-color:${c}30">${status}</span>`; }

let S={mkt:null,mktR:null,port:[],cats:null,execS:0,mode:'swing',exp:null,secAgo:0,tick:0,isLive:false,dataStatus:'DEGRADED'};
window.toggleExp=function(sym){S.exp=S.exp===sym?null:sym; renderAll();};
window.setMode=function(m){S.mode=m; doRefresh();};
window.showGuide=function(){buildGuide(); const g=document.getElementById('guide'); if(g) g.style.display='flex';};
window.hideGuide=function(){const g=document.getElementById('guide'); if(g) g.style.display='none';};

function renderAll(){
  const root=document.getElementById('root');
  if(!S.mkt||!S.mktR||!S.cats){root.innerHTML=loadingHTML(); return;}
  const mkt=S.mkt, mktR=S.mktR, cats=S.cats, execS=S.execS, port=S.port;
  const dc=mktR.color, regime=regimeFromMarket(mkt), trust=computeTrust(mkt,mktR,execS), trustColor=trust>=80?C.grn:trust>=60?C.yel:C.red, marketQuality=safeNum(mktR.score,50), execution=safeNum(execS,50);
  const history=pulseData(), drift=driftSummary(history);
  const catScores=[['Volatility',cats.v],['Trend',cats.t],['Breadth',cats.b],['Momentum',cats.m],['Macro',cats.mc]], driver=catScores.slice().sort((a,b)=>b[1]-a[1])[0]?.[0]||'Market Quality', constraint=catScores.slice().sort((a,b)=>a[1]-b[1])[0]?.[0]||'None';
  const analysis={COMMIT:`State vector locked toward |COMMIT⟩. Coherence ${Math.round(mktR.coherence*100)}%. ${regime}. Trust ${trust}/100. Full-size only if execution confirms.`,HOLD:`Mixed coherence ${Math.round(mktR.coherence*100)}% with entropy ${Math.round(mktR.entropy*100)}%. ${regime}. Trust ${trust}/100. Keep sizing tactical.`,WAIT:`High entropy (${Math.round(mktR.entropy*100)}%). State decoherent. ${regime}. Preserve capital until the tape regains alignment.`,ESCALATE:`Vector leaning defensive. ${regime}. Trust ${trust}/100. Hedge, trim exposure, and respect internal weakness.`,TOXIC:`TOXIC — max entropy, low coherence. ${regime}. Full capital preservation.`}[mktR.decision]||'';
  const sorted=mkt.sorted||[];
  const sectorRows=sorted.map(([sym,val])=>{ const pos=val>0,max=Math.max(...sorted.map(([,v])=>Math.abs(v)),.1),pct=Math.abs(val)/max*100,c=pos?C.grn:C.red; return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span style="width:26px;font-size:7px;color:${C.mid}">${sym}</span><div style="flex:1;height:10px;background:${C.bg};border-radius:2px;overflow:hidden;position:relative"><div style="position:absolute;${pos?'left':'right'}:0;height:100%;width:${pct}%;background:${c};opacity:.5"></div><span style="position:absolute;top:0;left:3px;font-size:7px;color:${c};line-height:10px;font-weight:bold">${pos?'+':''}${val.toFixed(2)}%</span></div></div>`; }).join('');
  const stockRows=port.map(s=>{ const sc=s.nerva.color, isExp=S.exp===s.sym; const detailHTML=isExp?`<div style="padding:9px 11px;background:${C.panel};border-top:1px solid ${C.border}20"><div style="padding:6px 9px;border-radius:3px;margin-bottom:8px;background:${sc+'08'};border:1px solid ${sc+'20'};font-size:8px;color:${C.txt};line-height:1.8">${s.nerva.decision} ${s.bias}. Coherence ${Math.round(s.nerva.coherence*100)}%. Entropy ${Math.round(s.nerva.entropy*100)}%.</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><div class="small">REAL INDICATORS</div><div style="font-size:8px;line-height:1.7;color:${C.txt}">20d $${fp(s.sma20)}<br>50d $${fp(s.sma50)}<br>200d $${fp(s.sma200)}<br>RSI ${s.rsi.toFixed(1)}<br>Vol ${fv(s.volume||0)}</div></div><div><div class="small">QUANTUM STATE</div>${barHTML(s.nerva.coherence,'Coherence')}${barHTML(s.nerva.commitProb,'Commit Prob')}${barHTML(1-s.nerva.entropy,'Low Entropy')}</div></div></div>`:''; return `<div style="border-bottom:1px solid ${C.border}18"><div class="hover-row" onclick="toggleExp('${s.sym}')" style="display:grid;grid-template-columns:46px 1fr 66px 50px 34px 96px 30px;padding:5px 9px;font-size:8px;background:${isExp?C.panel+'80':'transparent'}"><span style="color:${sc};font-weight:bold">${s.sym}</span><span style="color:${C.mid};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span><span style="text-align:right;color:${C.bright}">$${fp(s.price)}</span><span style="text-align:right;color:${s.chgPct>=0?C.grn:C.red}">${s.chgPct>=0?'+':''}${s.chgPct.toFixed(2)}%</span><span style="text-align:right;color:${s.rsi>70?C.red:s.rsi<30?C.grn:C.txt}">${s.rsi.toFixed(0)}</span><div style="display:flex;gap:3px;justify-content:flex-end;align-items:center;flex-wrap:wrap"><span style="color:${sc};font-weight:bold">${s.nerva.decision}</span><span style="font-size:6.5px;color:${s.bias==='LONG'?C.grn:C.red}">${s.bias}</span>${s.nerva.filtered?`<span class="pill" style="font-size:6px;color:${C.yel};border-color:${C.yel}30">FLT</span>`:''}${s.dataWeak?`<span class="pill" style="font-size:6px;color:${C.red};border-color:${C.red}30">DATA</span>`:''}${s.sizeDown?`<span class="pill" style="font-size:6px;color:${C.acc};border-color:${C.acc}30">SIZE</span>`:''}</div><span style="text-align:right;color:${sc};font-weight:bold">${s.nerva.score}</span></div>${detailHTML}</div>`; }).join('');
  const decompRows=[['Volatility',25,cats.v],['Trend',20,cats.t],['Breadth',20,cats.b],['Momentum',25,cats.m],['Macro',10,cats.mc]].map(([name,w,sc])=>{ const c=sc>=70?C.grn:sc>=50?C.yel:C.red; return `<div style="display:flex;align-items:center;gap:5px;padding:2px 0;font-size:8px"><span style="width:62px;color:${C.mid}">${name}</span><span style="width:20px;color:${C.dim};text-align:right">${w}%</span><div style="flex:1;height:4px;background:${C.bg};border-radius:2px;overflow:hidden;margin:0 4px"><div style="height:100%;width:${sc}%;background:${c};opacity:.7"></div></div><span style="width:20px;color:${c};text-align:right;font-weight:bold">${sc}</span><span style="width:24px;color:${C.dim};text-align:right">→${Math.round(w/100*sc)}</span></div>`; }).join('');
  root.innerHTML=`<div style="background:${C.bg};height:100vh;display:flex;flex-direction:column;overflow:hidden"><div style="border-bottom:1px solid ${C.border};padding:5px 12px;display:flex;justify-content:space-between;align-items:center;background:${C.panel};flex-shrink:0"><div style="display:flex;align-items:center;gap:8px"><span style="color:${C.acc};font-size:12px;font-weight:bold;letter-spacing:3px">◉ NERVA</span><span style="color:${C.dim};font-size:7px;letter-spacing:1.5px">MARKET v7.2</span>${dataStatusPill(S.dataStatus)}<span class="tt pill" data-tip="${TIPS.trust}" style="color:${trustColor};border-color:${trustColor}30">TRUST ${trust}</span><div style="display:flex;align-items:center;gap:3px"><div style="width:5px;height:5px;border-radius:50%;background:${S.isLive?C.grn:C.yel};animation:pulse 2s infinite"></div><span style="font-size:7px;color:${S.isLive?C.grn:C.yel};letter-spacing:1px">${S.isLive?'LIVE':'SIMULATION'}</span></div></div><div style="display:flex;gap:6px;align-items:center"><span id="sec-ago" style="font-size:7.5px;color:${C.dim}">${S.secAgo}s ago</span><button id="refresh-btn" style="background:${C.border};border:none;border-radius:3px;color:${C.acc};font-size:7px;padding:3px 7px;cursor:pointer">↻</button><div style="display:flex;border:1px solid ${C.border};border-radius:3px;overflow:hidden"><button onclick="setMode('swing')" style="background:${S.mode==='swing'?C.accd:'transparent'};border:none;color:${S.mode==='swing'?C.bright:C.dim};font-size:7px;padding:3px 7px;cursor:pointer">SWING</button><button onclick="setMode('day')" style="background:${S.mode==='day'?C.accd:'transparent'};border:none;color:${S.mode==='day'?C.bright:C.dim};font-size:7px;padding:3px 7px;cursor:pointer">DAY</button></div><button onclick="showGuide()" style="background:none;border:1px solid ${C.acc}40;border-radius:3px;color:${C.acc};font-size:7px;padding:3px 8px;cursor:pointer">? GUIDE</button></div></div><div style="flex:1;overflow-y:auto;padding:9px 11px"><div style="display:grid;grid-template-columns:1.2fr auto 1fr;gap:12px;align-items:center;padding:12px 14px;border:1px solid ${dc}22;border-radius:5px;background:linear-gradient(135deg,${C.panel}60,${dc}04);margin-bottom:9px"><div><div class="tt" data-tip="${TIPS.state}" style="font-size:6.5px;color:${C.mid};letter-spacing:2.5px;margin-bottom:3px">NERVA DECISION STATE (?)</div><div style="font-size:24px;font-weight:bold;color:${dc};letter-spacing:3px">${mktR.decision}</div><div style="margin-top:5px;display:flex;gap:4px"><span class="pill" style="color:${dc};border-color:${dc}30;background:${dc}10">${mktR.zone}</span><span class="pill" style="color:${C.acc};border-color:${C.acc}30;background:${C.accd}20">${S.mode.toUpperCase()}</span></div><div style="margin-top:6px;font-size:8px;color:${C.mid};line-height:1.7">Regime: <span style="color:${C.txt}">${regime}</span><br>Driver: <span style="color:${C.bright}">${driver}</span> · Constraint: <span style="color:${C.yel}">${constraint}</span><br>SPY <span style="color:${mkt.spy.chgPct>=0?C.grn:C.red}">${mkt.spy.chgPct>=0?'+':''}${safeNum(mkt.spy.chgPct,0).toFixed(2)}%</span> · VIX <span style="color:${mkt.vix.level<20?C.grn:mkt.vix.level<25?C.yel:C.red}">${safeNum(mkt.vix.level,16).toFixed(1)}</span></div></div><div style="display:flex;gap:8px;align-items:center"><div class="tt" data-tip="${TIPS.mq}">${scoreRingSVG(marketQuality,92,'Market Quality')}</div><div class="tt" data-tip="${TIPS.ex}">${scoreRingSVG(execution,66,'Execution')}</div></div><div class="card"><div class="small">SIGNAL STORY</div><div style="font-size:8px;line-height:1.8;color:${C.txt};margin-top:4px">${analysis}</div></div></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:9px">${['Volatility','Trend','Breadth','Momentum','Macro'].map((name, idx)=>{const score=[cats.v,cats.t,cats.b,cats.m,cats.mc][idx]; const c=score>=70?C.grn:score>=50?C.yel:C.red; const items=[[{l:'VIX',v:safeNum(mkt.vix.level,16).toFixed(1),c:mkt.vix.level<20?C.grn:C.yel},{l:'VVIX',v:safeNum(mkt.vvix.level,81).toFixed(0)},{l:'P/C',v:safeNum(mkt.putCall.ratio,.85).toFixed(2)}],[{l:'20d',v:mkt.spy.price>mkt.spy.sma20?'ABV':'BLW',c:mkt.spy.price>mkt.spy.sma20?C.grn:C.red},{l:'50d',v:mkt.spy.price>mkt.spy.sma50?'ABV':'BLW',c:mkt.spy.price>mkt.spy.sma50?C.grn:C.red},{l:'200d',v:mkt.spy.price>mkt.spy.sma200?'ABV':'BLW',c:mkt.spy.price>mkt.spy.sma200?C.grn:C.red}],[{l:'>20d',v:safeNum(mkt.breadth.a20,0).toFixed(0)+'%'},{l:'>50d',v:safeNum(mkt.breadth.a50,0).toFixed(0)+'%'},{l:'A/D',v:safeNum(mkt.breadth.ad,1).toFixed(2),c:mkt.breadth.ad>1?C.grn:C.red}],[{l:'Sec+',v:Object.values(mkt.sectors).filter(v=>v>0).length+'/11'},{l:'Spread',v:safeNum(mkt.spread,0).toFixed(1)+'%'},{l:'NH/NL',v:safeNum(mkt.breadth.nhNl,1).toFixed(1)}],[{l:'10Y',v:safeNum(mkt.macro.tny.y,4.3).toFixed(2)+'%'},{l:'DXY',v:safeNum(mkt.macro.dxy.l,104).toFixed(1)},{l:'FOMC',v:safeNum(mkt.macro.fomc,0)+'d'}]][idx]; return `<div class="card" style="position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c};opacity:.5"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><div class="tt" data-tip="${TIPS[name.toLowerCase()]}" style="font-size:7.5px;color:${C.mid}">${name} (?)</div><div style="font-size:13px;color:${c};font-weight:bold">${score}</div></div>${items.map(({l,v,c:ic})=>`<div style="display:flex;justify-content:space-between;font-size:8px;margin-bottom:2px"><span style="color:${C.dim}">${l}</span><span style="color:${ic||C.txt}">${v}</span></div>`).join('')}</div>`;}).join('')}</div><div style="display:grid;grid-template-columns:1fr .9fr .9fr;gap:8px;margin-bottom:9px"><div class="card"><div class="small"><span class="tt" data-tip="${TIPS.heat}">SECTOR HEATMAP (?)</span> <span style="float:right;color:${mkt.spread>0?C.grn:C.red}">spread ${safeNum(mkt.spread,0).toFixed(2)}%</span></div>${sectorRows}</div><div class="card"><div class="small"><span class="tt" data-tip="${TIPS.ex}">EXECUTION WINDOW (?)</span></div><div style="font-size:16px;font-weight:bold;color:${execution>=70?C.grn:execution>=50?C.yel:C.red};margin:4px 0 5px">${execution}<span style="font-size:8px;color:${C.mid}">/100</span></div>${barHTML(mkt.exec.br,'Breakouts Holding')}${barHTML(mkt.exec.rt,'Gain Retention')}${barHTML(mkt.exec.pb,'Pullback Buying')}${barHTML(mkt.exec.ft,'Follow-Through')}</div><div class="card"><div class="small"><span class="tt" data-tip="${TIPS.drift}">HOURLY DRIFT (?)</span></div><div style="display:flex;justify-content:space-between;align-items:center;margin:4px 0 6px"><span style="font-size:14px;font-weight:bold;color:${drift.color}">${drift.label}</span><span style="font-size:7px;color:${C.dim}">last ${Math.min(history.length,3)} checks</span></div>${driftMini(history,240,90)}<div style="font-size:7px;line-height:1.7;color:${C.txt};margin-top:4px">${drift.text}</div></div></div><div style="border:1px solid ${C.border};border-radius:4px;overflow:hidden;margin-bottom:9px"><div style="display:flex;justify-content:space-between;align-items:center;background:${C.panel};border-bottom:1px solid ${C.border}"><div style="padding:5px 11px;color:${C.acc};font-size:8px;letter-spacing:1px" class="tt" data-tip="${TIPS.table}">◈ CORE PORTFOLIO ONLY (?)</div><div style="display:flex;gap:5px;padding-right:8px"><span class="pill tt" data-tip="${TIPS.badges}" style="color:${C.yel};border-color:${C.yel}30">FLT</span><span class="pill tt" data-tip="${TIPS.badges}" style="color:${C.red};border-color:${C.red}30">DATA</span><span class="pill tt" data-tip="${TIPS.badges}" style="color:${C.acc};border-color:${C.acc}30">SIZE</span></div></div><div style="display:grid;grid-template-columns:46px 1fr 66px 50px 34px 96px 30px;padding:4px 9px;font-size:7px;color:${C.dim};border-bottom:1px solid ${C.border}"><span>SYM</span><span>NAME</span><span style="text-align:right">PRICE</span><span style="text-align:right">CHG%</span><span style="text-align:right">RSI</span><span style="text-align:right">STATE</span><span style="text-align:right">NQ</span></div>${stockRows}</div><div class="card"><div class="small">SCORE DECOMPOSITION</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 16px">${decompRows}</div><div style="margin-top:7px;padding-top:6px;border-top:1px solid ${C.border};display:flex;justify-content:space-between;align-items:center"><span style="font-size:7.5px;color:${C.dim}">WEIGHTED MARKET QUALITY / TRUST</span><span style="font-size:13px;color:${marketQuality>=80?C.grn:marketQuality>=60?C.yel:C.red};font-weight:bold">${marketQuality} / 100 <span style="color:${trustColor};font-size:9px">· TRUST ${trust}</span></span></div></div></div></div>`;
  const rb=document.getElementById('refresh-btn'); if(rb) rb.onclick=()=>doRefresh();
}

function buildGuide(){const g=document.getElementById('guide'); if(g&& !g._built){g._built=true; g.innerHTML=`<div style="background:#091524;border:1px solid #162840;border-radius:6px;max-width:620px;width:100%;max-height:85vh;overflow-y:auto;padding:16px 18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><div style="font-size:12px;color:#4a9eff;font-weight:bold;letter-spacing:2px">◉ NERVA MARKET v7.3</div><div style="font-size:7px;color:#253d55;letter-spacing:1.5px">TRUST BUILD GUIDE</div></div><button onclick="hideGuide()" style="background:#162840;border:none;color:#8aafc5;font-size:8px;padding:4px 9px;border-radius:3px;cursor:pointer">✕ CLOSE</button></div><div style="font-size:9px;color:#8aafc5;line-height:1.85">v7.2 intentionally cuts the universe and surfaces data honesty. This version is about trust: fewer symbols, visible data status, slower refresh, and a plain-English drift meter.</div></div>`;}}

window.doRefresh=async function(){
  try{
    const live=await fetchLiveData(), d=live||genMarket(S.tick); S.isLive=!!live; S.dataStatus=d.dataStatus||'DEGRADED';
    const rawP=mktParams(d), adj=S.mode==='day'?{...rawP,E:Math.min(1,safeNum(rawP.E,.5)*1.22),R:Math.min(1,safeNum(rawP.R,.5)*1.16),Support:Math.max(0,safeNum(rawP.Support,.5)-0.05),Stability:Math.max(0,safeNum(rawP.Stability,.5)-0.06)}:{...rawP,E:safeNum(rawP.E,.5),R:safeNum(rawP.R,.5),Support:safeNum(rawP.Support,.5),Stability:safeNum(rawP.Stability,.5)};
    const res=NERVA.classify(adj); ['entropy','coherence','commitProb','score'].forEach(k=>res[k]=safeNum(res[k],k==='score'?50:.5)); res.bloch={x:safeNum(res.bloch?.x,0),y:safeNum(res.bloch?.y,0),z:safeNum(res.bloch?.z,0)};
    const ex=Math.round((safeNum(d.exec.breakoutRetention,d.exec.br||.5)*.3+safeNum(d.exec.trendReliability,d.exec.rt||.5)*.25+safeNum(d.exec.pullbackBid,d.exec.pb||.5)*.25+safeNum(d.exec.followThrough,d.exec.ft||.5)*.2)*100);
    savePulsePoint(res.score, ex, computeTrust(d,res,ex));
    const rawPortfolio = Array.isArray(d.rawPortfolio)&&d.rawPortfolio.length ? d.rawPortfolio : CORE_PORT.map(x=>({sym:x.sym,price:x.bp,changePct:0,rsi:0,sma50:0,sma200:0,volume:0}));
    const coreMap=Object.fromEntries(CORE_PORT.map(x=>[x.sym,x]));
    const port=rawPortfolio.filter(x=>coreMap[x.sym]).map(raw=>enrichStock(raw,coreMap[raw.sym],S.tick,d));
    const vl=d.vix.level, vs=Math.min(100,Math.max(0,Math.round((1-Math.min(1,(vl-10)/25))*68+((d.vix.trend5d||0)<0?18:0)+(d.putCall.ratio<1?10:0)))), ts=Math.min(100,Math.max(0,Math.round(adj.S*100 + ((d.spy.chg20d||0)>0?4:-4)))), bs=Math.min(100,Math.max(0,Math.round((d.breadth.a20+d.breadth.a50+d.breadth.a200)/3))), ms=Math.min(100,Math.max(0,Math.round((Object.values(d.sectors).filter(v=>v>0).length/11)*55+Math.max(0,Math.min(45,d.spread*18))+((d.spy.chg5d||0)>0?4:0)))), mc=Math.min(100,Math.max(0,Math.round((d.macro.fed==='dovish'?42:25)+(d.macro.tny.y<4.5?20:10)+(d.macro.fomc>7?20:5)+(d.macro.dxy.t==='weak'?14:9))));
    S={...S,mkt:d,mktR:res,port,cats:{v:vs,t:ts,b:bs,m:ms,mc},execS:ex,secAgo:0,tick:S.tick+1};
    renderAll();
  }catch(err){ console.error('NERVA refresh error:',err); }
};

setInterval(()=>{S.secAgo++; const el=document.getElementById('sec-ago'); if(el) el.textContent=S.secAgo+'s ago';},1000);
setInterval(()=>doRefresh(),120000);
doRefresh();
</script>
