<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERVA MARKET v5.2 — Enterprise Terminal</title>
    <style>
        :root {
            --bg: #050b14; --panel: #0b1624; --bdr: #1e2f45;
            --dim: #8aafc5; --mid: #cbd5e0; --txt: #ffffff;
            --brand: #f0b90b; --up: #00ff88; --dn: #ff4466; --wait: #ffcc00;
        }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* TICKER */
        .ticker-wrap { background: #07111d; border-bottom: 1px solid var(--bdr); height: 35px; overflow: hidden; display: flex; align-items: center; }
        .ticker { display: flex; white-space: nowrap; animation: scroll 60s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .tick-item { margin: 0 25px; font-family: monospace; font-size: 13px; }

        .container { display: grid; grid-template-columns: 320px 1fr 350px; height: calc(100vh - 35px); gap: 1px; background: var(--bdr); }
        .panel { background: var(--panel); padding: 20px; overflow-y: auto; position: relative; }

        /* CIRCULAR GAUGES */
        .gauge-wrap { display: flex; justify-content: space-around; margin: 30px 0; }
        .gauge { position: relative; width: 100px; height: 100px; }
        .gauge-svg { transform: rotate(-90deg); width: 100px; height: 100px; }
        .gauge-bg { fill: none; stroke: #1a2a3a; stroke-width: 8; }
        .gauge-val { fill: none; stroke: var(--brand); stroke-width: 8; stroke-dasharray: 251.2; stroke-linecap: round; transition: stroke-dashoffset 1s; }
        .gauge-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }

        /* BLOCH SPHERE */
        .bloch-container { border: 1px solid var(--bdr); border-radius: 12px; padding: 20px; text-align: center; margin-top: 20px; background: rgba(0,0,0,0.2); }
        .sphere { width: 180px; height: 180px; border: 2px solid var(--dim); border-radius: 50%; margin: 20px auto; position: relative; opacity: 0.6; }
        .vector { position: absolute; bottom: 50%; left: 50%; width: 2px; height: 75px; background: var(--brand); transform-origin: bottom center; transition: transform 1s; }

        /* STOCK ROWS */
        .stock-row { border-bottom: 1px solid #1a2a3a; padding: 12px; cursor: pointer; transition: background 0.2s; }
        .stock-row:hover { background: #132438; }
        .row-main { display: flex; justify-content: space-between; align-items: center; }
        .row-detail { display: none; padding: 15px; background: #07111d; border-radius: 8px; margin-top: 10px; font-size: 13px; color: var(--mid); }

        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 10px; }

        .btn-toggle { background: #1a2a3a; border: 1px solid var(--bdr); color: var(--dim); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-toggle.active { background: #2c3e50; color: white; border-color: var(--brand); }
    </style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker" id="ticker-content"></div></div>

<div class="container" id="app">
    <div style="padding: 50px; color: var(--brand);">LOADING ENTERPRISE INTERFACE...</div>
</div>

<script>
    let mode = 'SWING';

    async function fetchData() {
        try {
            const resp = await fetch('/api/market');
            const data = await resp.json();
            renderAll(data);
        } catch (e) { console.error(e); }
    }

    function renderAll(m) {
        // Ticker logic
        const tick = document.getElementById('ticker-content');
        const items = m.portfolio.concat(Object.keys(m.sectors).map(s => ({sym: s, price: m.sectors[s], changePct: m.sectors[s]})));
        tick.innerHTML = items.map(i => `
            <span class="tick-item">
                <span style="color:var(--dim)">${i.sym}</span> 
                <span style="color:${i.changePct >=0 ? 'var(--up)':'var(--dn)'}">${i.changePct.toFixed(2)}%</span>
            </span>
        `).join('') + tick.innerHTML;

        document.getElementById('app').innerHTML = `
            <div class="panel">
                <h3 style="color:var(--brand); font-size:12px; letter-spacing:1px;">POSITIONS</h3>
                ${m.portfolio.map(s => renderStockRow(s)).join('')}
            </div>

            <div class="panel" style="border-left:1px solid var(--bdr); border-right:1px solid var(--bdr);">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h1 style="font-size:20px; letter-spacing:2px;">NERVA MARKET</h1>
                        <div style="color:var(--up); font-size:11px;">● LIVE DATA STREAMING</div>
                    </div>
                    <div>
                        <button class="btn-toggle ${mode==='SWING'?'active':''}" onclick="mode='SWING'">SWING</button>
                        <button class="btn-toggle ${mode==='DAY'?'active':''}" onclick="mode='DAY'">DAY</button>
                    </div>
                </div>

                <div style="text-align:center; margin-top:40px;">
                    <div style="font-size:12px; color:var(--dim); letter-spacing:3px;">DECISION STATE</div>
                    <div style="font-size:52px; font-weight:900; color:var(--brand); margin:10px 0;">HOLD</div>
                    <div style="color:var(--wait); font-size:11px; letter-spacing:5px;">CAUTION RE-ENTRY</div>
                </div>

                <div class="gauge-wrap">
                    ${renderGauge('Quality', 71, '#f0b90b')}
                    ${renderGauge('Execution', 80, '#00ff88')}
                </div>

                <div style="background:#07111d; padding:20px; border-radius:12px; border:1px solid var(--bdr);">
                    <h4 style="font-size:11px; color:var(--dim); margin:0 0 10px 0;">TERMINAL ANALYSIS</h4>
                    <p style="color:var(--mid); font-size:14px; line-height:1.6; margin:0;">
                        Mixed coherence observed at 35%. State vector locked to |HOLD⟩. Standard uptrend logic 
                        remains dominant but requires <strong>Half Position Sizing</strong> until coherence 
                        re-crosses the 50% meridian.
                    </p>
                </div>
            </div>

            <div class="panel">
                <div class="bloch-container">
                    <div style="font-size:11px; color:var(--dim); letter-spacing:2px;">BLOCH STATE VECTOR</div>
                    <div class="sphere"><div class="vector" style="transform: rotate(35deg);"></div></div>
                    <div style="display:flex; justify-content:space-around; font-family:monospace; color:var(--brand);">
                        <div>S: 3%</div><div>P: 82%</div><div>C: 35%</div>
                    </div>
                </div>

                <h3 style="color:var(--brand); font-size:12px; letter-spacing:1px; margin-top:30px;">SECTOR ROTATION</h3>
                ${Object.entries(m.sectors).map(([name, val]) => `
                    <div style="margin-bottom:12px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
                            <span style="color:var(--dim)">${name}</span>
                            <span style="color:${val>=0?'var(--up)':'var(--dn)'}">${val.toFixed(2)}%</span>
                        </div>
                        <div style="height:6px; background:#1a2a3a; border-radius:3px; overflow:hidden;">
                            <div style="width:${Math.min(Math.abs(val)*20, 100)}%; height:100%; background:${val>=0?'var(--up)':'var(--dn)'}; opacity:0.8;"></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderGauge(label, val, color) {
        const offset = 251.2 - (251.2 * val / 100);
        return `
            <div class="gauge">
                <svg class="gauge-svg"><circle class="gauge-bg" cx="50" cy="50" r="40"/><circle class="gauge-val" cx="50" cy="50" r="40" style="stroke-dashoffset:${offset}; stroke:${color}"/></svg>
                <div class="gauge-text">
                    <div style="font-size:20px; font-weight:bold; color:white;">${val}</div>
                    <div style="font-size:9px; color:var(--dim); text-transform:uppercase;">${label}</div>
                </div>
            </div>
        `;
    }

    function renderStockRow(s) {
        return `
            <div class="stock-row" onclick="toggleDetail('${s.sym}')">
                <div class="row-main">
                    <div>
                        <div style="font-weight:bold; font-size:14px;">${s.sym}</div>
                        <div style="font-size:10px; color:var(--dim);">QUANTUM ID: ${Math.random().toString(36).substring(7).toUpperCase()}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:bold; color:${s.changePct >=0 ? 'var(--up)':'var(--dn)'}">${s.changePct.toFixed(2)}%</div>
                        <div style="font-size:14px;">$${s.price.toFixed(2)}</div>
                    </div>
                </div>
                <div class="row-detail" id="detail-${s.sym}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>Urgency (E): 0.82</span> <span>Integrity (I): 92%</span>
                    </div>
                    <div>STATUS: No noise filter triggered. Alignment remains within 2σ of historical mean.</div>
                </div>
            </div>
        `;
    }

    function toggleDetail(sym) {
        const el = document.getElementById(`detail-${sym}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>

</body>
</html>
