function showTT(node,e){const tip=node.getAttribute('data-tip'); if(!tip) return; ttNode=node; TT.textContent=tip; TT.classList.add('show'); moveTT(e);}
function moveTT(e){if(!ttNode) return; const pad=14,vw=innerWidth,vh=innerHeight,r=TT.getBoundingClientRect(); let x=e.clientX+pad,y=e.clientY+pad; if(x+r.width+12>vw) x=e.clientX-r.width-pad; if(y+r.height+12>vh) y=e.clientY-r.height-pad; if(x<8)x=8; if(y<8)y=8; TT.style.transform=`translate(${x}px,${y}px)`;}

};

function safeNum(v,f=0){const n=Number(v); return Number.isFinite(n)?n:f;}
function fp(p){return p<20?p.toFixed(2):p<200?p.toFixed(1):p.toFixed(0);}
function fv(v){return v>1e6?(v/1e6).toFixed(1)+'M':(v/1e3).toFixed(0)+'K';}
function inferName(sym){return ({VGT:'Vanguard Information Technology ETF',GDX:'VanEck Gold Miners ETF',QBTS:'D-Wave Quantum',VYM:'Vanguard High Dividend Yield ETF',XYZ:'Block Inc.'})[sym]||sym;}
function rng(s){let r=s;return()=>{r=(r*16807)%2147483647;return(r-1)/2147483646;};}

const NERVA={
  bloch(t,p){const a=Math.cos(t/2),b=Math.sin(t/2);return{a,b,x:Math.sin(t)*Math.cos(p),y:Math.sin(t)*Math.sin(p),z:Math.cos(t)};},
  density(pr){const t=Math.PI*(1-(pr.S*.3+pr.Support*.3+pr.Stability*.25+(1-pr.R)*.15)),p=2*Math.PI*pr.E,st=this.bloch(t,p),r00=st.a**2,coh=Math.sqrt((st.a*(Math.sin(t/2))*Math.cos(p))**2+(st.a*(Math.sin(t/2))*Math.sin(p))**2); return{r00,coh,st};},
  entropy(dm){const det=dm.r00*(1-dm.r00)-dm.coh**2,disc=Math.sqrt(Math.max(0,.25-det)),l1=Math.max(1e-10,.5+disc),l2=Math.max(1e-10,.5-disc),raw=-(l1*Math.log2(l1)+l2*Math.log2(l2)); return Math.min(1,Math.max(0,Math.max(raw,.05*(1-dm.coh))));},
  classify(pr){const dm=this.density(pr),ent=this.entropy(dm),{coh,r00,st}=dm; let d,z,c; if(coh>.4&&r00>.65&&ent<.4){d='COMMIT';z='TRADE';c=C.grn}else if(coh>.3&&r00>.5&&ent<.6){d='HOLD';z='CAUTION';c=C.yel}else if(ent>.7||coh<.15){d='WAIT';z='NO TRADE';c=C.mid}else if(r00<.35&&coh>.3){d='ESCALATE';z='HEDGE';c=C.orn}else if(ent>.8&&coh<.1){d='TOXIC';z='AVOID';c=C.red}else{d='HOLD';z='CAUTION';c=C.yel} return{decision:d,zone:z,color:c,entropy:ent,coherence:coh,commitProb:r00,bloch:st,score:Math.round((r00*.35+coh*.35+(1-ent)*.3)*100)};}
};

function applyNoiseFilter(nerva, price, chgPct, rsi) {
  const reasons=[];
  if(price<8) reasons.push('Low price');
  if(Math.abs(chgPct)>5) reasons.push('High vol');
  if(rsi>75) reasons.push('RSI high');
  if(rsi<25) reasons.push('RSI low');
  if(reasons.length && nerva.decision==='COMMIT') return {...nerva,decision:'HOLD',zone:'CAUTION',color:C.yel,filtered:true,filterReasons:reasons};
  return {...nerva,filtered:false,filterReasons:[]};
}

function genStock(def,i,tick){
  const r=rng(i*7919+tick*31),n=()=>(r()-.5)*.03,w=Math.sin((Date.now()+i*1e6)/5e6);
  const price=def.bp*(1+n()*2+w*.02),chgPct=n()*4+w*.5,vol=500000+r()*5e6,sma20=price*(1+(r()-.55)*.04),sma50=price*(1+(r()-.52)*.07),sma200=price*(1+(r()-.48)*.12),rsi=40+r()*30+w*10;
  const above=(price>sma20?1:0)+(price>sma50?1:0)+(price>sma200?1:0),E=Math.min(1,Math.max(0,Math.abs(chgPct)/5+((rsi>70||rsi<30)?0.3:0))),S=above/3,R=Math.min(1,Math.max(0,(rsi>70?.7:rsi<30?.7:.2)+Math.abs(chgPct)/8)),Support=Math.min(1,Math.max(0,above/3*.6+(vol>2e6?.3:.1)+.1)),Stability=Math.min(1,Math.max(0,.5+(price>sma200?.2:-.2)+w*.1));
  const nerva=applyNoiseFilter(NERVA.classify({E,S,R,Support,Stability}),price,chgPct,rsi);
  return {...def,price,chgPct,vol,sma20,sma50,sma200,rsi,above,nerva,bias:price>sma50?'LONG':'SHORT'};
}

function genMarket(tick){
  const n=()=>(Math.random()-.5)*.02,w=Math.sin(Date.now()/5e6),spyP=568+w*3+n()*10,vixL=16.8-w*2+Math.random()*3,sp={}; SECS.forEach(s=>{sp[s]=(Math.random()-.3)*2.5;});
  const sorted=Object.entries(sp).sort((a,b)=>b[1]-a[1]), spread=sorted.slice(0,3).reduce((s,e)=>s+e[1],0)/3-sorted.slice(-3).reduce((s,e)=>s+e[1],0)/3;
  return {spy:{price:spyP,sma20:spyP-2+n()*5,sma50:spyP-5+n()*8,sma200:spyP-20+n()*10,rsi:55+w*15+Math.random()*10,chgPct:n()*3,chg5d:n()*5,chg20d:n()*8},
    qqq:{price:487+w*4,sma50:482+n()*8,chgPct:n()*3,chg5d:n()*6,chg20d:n()*9},vix:{level:vixL,trend5d:-.3+n()*1.5,chgPct:n()*4},vvix:{level:82+Math.random()*15},putCall:{ratio:.85+n()*.3},
    breadth:{a20:62+Math.random()*20,a50:55+Math.random()*20,a200:58+Math.random()*18,ad:1.2+n()*.8,nhNl:2.1+n()*1.5},sectors:sp,sorted,spread,
    macro:{tny:{y:4.32+n()*.3,t:w>0?'rising':'falling'},dxy:{l:104.2+n()*2,t:w>.3?'str':'weak'},fed:'neutral',fomc:Math.floor(Math.random()*30)+2,regime:''},
    exec:{breakoutRetention:.6+Math.random()*.3,trendReliability:.55+Math.random()*.35,pullbackBid:.5+Math.random()*.4,followThrough:.45+Math.random()*.4}
  };
}

      breadth:{a20:d.breadth?.above20d||60,a50:d.breadth?.above50d||55,a200:d.breadth?.above200d||55,ad:d.breadth?.advDeclineRatio||1.1,nhNl:d.breadth?.nhNl||1.5},
      sectors:sp,sorted,spread,

      exec:{breakoutRetention:d.exec?.breakoutRetention||.65,trendReliability:d.exec?.trendReliability||.6,pullbackBid:d.exec?.pullbackBid||.55,followThrough:d.exec?.followThrough||.5,br:d.exec?.breakoutRetention||.65,rt:d.exec?.trendReliability||.6,pb:d.exec?.pullbackBid||.55,ft:d.exec?.followThrough||.5},

function mktParams(d){
  const vN=Math.max(0,Math.min(1,(safeNum(d.vix.level,16)-10)/30)),fU=d.macro.fomc<3?.9:d.macro.fomc<7?.6:.3;
  const E=vN*.6+fU*.4, S=(d.spy.price>d.spy.sma20?0.25:0)+(d.spy.price>d.spy.sma50?0.25:0)+(d.spy.price>d.spy.sma200?0.3:0)+(d.qqq.price>d.qqq.sma50?0.2:0);
  const rsi=safeNum(d.spy.rsi,55), rR=rsi>70?.7:rsi<30?.8:.2, vR=d.vix.level>25?.8:d.vix.level>20?.5:.2, R=vR*.4+rR*.3+Math.min(1,safeNum(d.putCall.ratio,.85))*.3;
  const bA=(safeNum(d.breadth.a20,55)+safeNum(d.breadth.a50,50)+safeNum(d.breadth.a200,50))/300,sP=Object.values(d.sectors).filter(v=>v>0).length/11;
  const Support=bA*.6+sP*.4,mS=d.macro.fed==='dovish'?.8:d.macro.fed==='neutral'?.6:.3,eBreak=safeNum(d.exec.breakoutRetention,d.exec.br),eTrend=safeNum(d.exec.trendReliability,d.exec.rt),ePull=safeNum(d.exec.pullbackBid,d.exec.pb),eFollow=safeNum(d.exec.followThrough,d.exec.ft),eA=(eBreak+eTrend+ePull+eFollow)/4;
  return {E,S,R,Support,Stability:mS*.4+eA*.6};
}

function regimeFromMarket(d){
  const up50=d.spy.price>d.spy.sma50,up200=d.spy.price>d.spy.sma200,breadthStrong=d.breadth.a20>55&&d.breadth.ad>1,breadthWeak=d.breadth.a20<40||d.breadth.ad<0.9;
  if(up50&&up200&&breadthStrong&&d.vix.level<22) return 'Strong Uptrend';
  if(up50&&up200&&d.spread>0) return 'Orderly Uptrend';
  if(!up50&&!up200&&breadthWeak) return 'Confirmed Downtrend';
  if(d.vix.level>25||d.spread<-0.7) return 'Stress / Distribution';
  return 'Chop / Transition';
}
function computeTrust(d,mktR,execS){
  const score=safeNum(mktR.score,50), ad=safeNum(d.breadth.ad,1), vix=safeNum(d.vix.level,16), spread=safeNum(d.spread,0), ex=safeNum(execS,50);
  const base=score*.45+ex*.2+Math.max(0,Math.min(100,ad*45))*.15+Math.max(0,Math.min(100,(100-vix*2.2)))*.1+Math.max(0,Math.min(100,50+spread*20))*.1;
  return Math.max(0,Math.min(100,Math.round(base)));
}
function enrichStock(raw,def,i,tick,mkt){
  const s=genStock(def||{sym:raw.sym,name:inferName(raw.sym),bp:Math.max(1,safeNum(raw.price,10)||10)},i,tick),useOrFallback=(v,f)=>(Number(v)>0?Number(v):f);
  const price=useOrFallback(raw.price,s.price), chgPct=safeNum(raw.changePct,s.chgPct), rsi=useOrFallback(raw.rsi,s.rsi||50), sma50=useOrFallback(raw.sma50,price*.97), sma200=useOrFallback(raw.sma200,price*.93), sma20=useOrFallback(raw.sma20,price*(price>=sma50?0.995:1.005)), volume=useOrFallback(raw.volume,s.vol||0);
  const above=(price>sma20?1:0)+(price>sma50?1:0)+(price>sma200?1:0),E=Math.min(1,Math.max(0,Math.abs(chgPct)/5+((rsi>70||rsi<30)?0.25:0)+(mkt.vix.level>22?0.12:0))),S=above/3,R=Math.min(1,Math.max(0,Math.abs(chgPct)/8+(rsi>75||rsi<25?0.35:0)+(mkt.vix.level>25?0.2:0.05))),Support=Math.min(1,Math.max(0,0.2+above/3*.55+(Math.abs(chgPct)<2?0.15:0)+(mkt.spread>0?0.1:0))),Stability=Math.min(1,Math.max(0,0.4+(price>sma200?0.2:-0.15)+(mkt.breadth.ad>1?0.15:0)+(mkt.macro.fomc>7?0.1:0)));
  const nerva=applyNoiseFilter(NERVA.classify({E,S,R,Support,Stability}),price,chgPct,rsi), dataWeak=Number(raw.rsi)<=1||Number(raw.sma50)<=0||Number(raw.sma200)<=0||Number(raw.volume)<=0, mtf=((chgPct>0?1:0)+(price>sma50?1:0)+(price>sma200?1:0))/3, sizeDown=nerva.coherence<.4||nerva.entropy>.5;

${catCard('Trend','◇',cats.t,[{l:'20d',v:mkt.spy.price>mkt.spy.sma20?'ABV':'BLW',c:mkt.spy.price>mkt.spy.sma20?C.grn:C.red},{l:'50d',v:mkt.spy.price>mkt.spy.sma50?'ABV':'BLW',c:mkt.spy.price>mkt.spy.sma50?C.grn:C.red},{l:'200d',v:mkt.spy.price>mkt.spy.sma200?'ABV':'BLW',c:mkt.spy.price>mkt.spy.sma200?C.grn:C.red},{l:'RSI',v:mkt.spy.rsi.toFixed(0),c:mkt.spy.rsi>70?C.red:mkt.spy.rsi<30?C.grn:C.txt}])}
${catCard('Breadth','◎',cats.b,[{l:'>20d',v:mkt.breadth.a20.toFixed(0)+'%',c:mkt.breadth.a20>60?C.grn:C.yel},{l:'>50d',v:mkt.breadth.a50.toFixed(0)+'%'},{l:'>200d',v:mkt.breadth.a200.toFixed(0)+'%'},{l:'A/D',v:mkt.breadth.ad.toFixed(2),c:mkt.breadth.ad>1?C.grn:C.red}])}
${catCard('Momentum','◆',cats.m,[{l:'Sec+',v:Object.values(mkt.sectors).filter(v=>v>0).length+'/11'},{l:'Spread',v:mkt.spread.toFixed(1)+'%',c:mkt.spread>1?C.grn:C.yel},{l:'NH/NL',v:mkt.breadth.nhNl.toFixed(1),c:mkt.breadth.nhNl>1.5?C.grn:C.yel}])}
${catCard('Macro','◫',cats.mc,[{l:'10Y',v:mkt.macro.tny.y.toFixed(2)+'%',d:mkt.macro.tny.t==='rising'?'↑':'↓',c:mkt.macro.tny.y<4.5?C.grn:C.yel},{l:'DXY',v:mkt.macro.dxy.l.toFixed(1)},{l:'Fed',v:mkt.macro.fed.toUpperCase(),c:mkt.macro.fed==='dovish'?C.grn:mkt.macro.fed==='neutral'?C.yel:C.red},{l:'FOMC',v:mkt.macro.fomc+'d',c:mkt.macro.fomc<3?C.red:mkt.macro.fomc<7?C.orn:C.mid}])}
</div>

<div style="display:grid;grid-template-columns:1fr 1fr 0.9fr;gap:8px;margin-bottom:9px">
<div class="card"><div class="small"><span style="color:${C.acc};margin-right:3px">▦</span><span class="tt" data-tip="SECTOR HEATMAP\nDaily sector rotation.">SECTOR HEATMAP (?)</span> <span style="float:right;color:${mkt.spread>0?C.grn:C.red}">spread ${mkt.spread.toFixed(2)}%</span></div>${sectorRows}</div>
<div style="display:flex;flex-direction:column;gap:7px"><div class="card" style="border-color:${dc}18;background:${dc}05"><div class="small" style="color:${dc}">◉ TERMINAL ANALYSIS</div><div style="font-size:8.5px;line-height:1.75;color:${C.txt}">${analysis}</div></div><div class="card"><div class="small"><span style="color:${C.acc};margin-right:3px">⚡</span><span class="tt" data-tip="${TIPS.ex}">EXECUTION WINDOW (?)</span></div><div style="font-size:16px;font-weight:bold;color:${execution>=70?C.grn:execution>=50?C.yel:C.red};margin-bottom:5px">${execution}<span style="font-size:8px;color:${C.mid}">/100</span></div>${barHTML(mkt.exec.br,'Breakouts Holding')}${barHTML(mkt.exec.rt,'Gain Retention')}${barHTML(mkt.exec.pb,'Pullback Buying')}${barHTML(mkt.exec.ft,'Follow-Through')}</div></div>
<div class="card tt" data-tip="${TIPS.pulse}"><div class="small" style="margin-bottom:4px">INTRADAY PULSE (?)</div>${pulseSVG(pulse,250,120)}<div style="display:flex;gap:10px;font-size:7px;color:${C.mid};margin-top:4px"><span style="color:${C.acc}">— MQ</span><span style="color:${C.yel}">— EX</span><span style="color:${C.grn}">— TRUST</span></div></div>
</div>

<div style="border:1px solid ${C.border};border-radius:4px;overflow:hidden;margin-bottom:9px">
<div style="display:flex;justify-content:space-between;align-items:center;background:${C.panel};border-bottom:1px solid ${C.border}">
<div style="display:flex"><button class="tt" data-tip="MY PORTFOLIO\nLive tracked positions." onclick="setTab('portfolio')" style="background:transparent;border:none;border-bottom:2px solid ${tab==='portfolio'?C.acc:'transparent'};color:${tab==='portfolio'?C.acc:C.dim};font-size:8px;padding:5px 11px;cursor:pointer;letter-spacing:1px">◈ MY PORTFOLIO (?)</button><button class="tt" data-tip="${TIPS.opportunity}" onclick="setTab('watchlist')" style="background:transparent;border:none;border-bottom:2px solid ${tab==='watchlist'?C.acc:'transparent'};color:${tab==='watchlist'?C.acc:C.dim};font-size:8px;padding:5px 11px;cursor:pointer;letter-spacing:1px">◆ OPPORTUNITY SURFACE (25) (?)</button></div>
<div style="display:flex;gap:5px;padding-right:8px"><span class="pill tt" data-tip="FLT = Noise filter triggered." style="color:${C.yel};border-color:${C.yel}30">FLT</span><span class="pill tt" data-tip="DATA = missing or synthetic indicators." style="color:${C.red};border-color:${C.red}30">DATA</span><span class="pill tt" data-tip="SIZE = tactical sizing only." style="color:${C.acc};border-color:${C.acc}30">SIZE</span></div>
</div>
<div style="display:grid;grid-template-columns:46px 1fr 66px 50px 34px 96px 30px;padding:4px 9px;font-size:7px;color:${C.dim};border-bottom:1px solid ${C.border}"><span>SYM</span><span>NAME</span><span style="text-align:right">PRICE</span><span style="text-align:right">CHG%</span><span style="text-align:right">RSI</span><span style="text-align:right">STATE</span><span style="text-align:right">NQ</span></div>
${stockRows}
</div>

<div class="card" style="margin-bottom:9px"><div class="small"><span style="color:${C.acc};margin-right:3px">≡</span><span>SCORE DECOMPOSITION</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 16px">${decompRows}</div><div style="margin-top:7px;padding-top:6px;border-top:1px solid ${C.border};display:flex;justify-content:space-between;align-items:center"><span style="font-size:7.5px;color:${C.dim}">WEIGHTED MARKET QUALITY / TRUST</span><span style="font-size:13px;color:${marketQuality>=80?C.grn:marketQuality>=60?C.yel:C.red};font-weight:bold">${marketQuality} / 100 <span style="color:${trustColor};font-size:9px">· TRUST ${trust}</span></span></div></div>
<div style="text-align:center;padding:5px 0 2px;font-size:6px;color:${C.dim};letter-spacing:2px">NERVA MARKET v7.0.1 — GLOBAL COHERENCE — STARPOINT ENTERPRISES LLC — AMDG</div>
</div></div></div></div>`;
}

function buildGuide(){const g=document.getElementById('guide'); if(g._built) return; g._built=true; g.innerHTML=`<div style="background:#091524;border:1px solid #162840;border-radius:6px;max-width:620px;width:100%;max-height:85vh;overflow-y:auto;padding:16px 18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><div style="font-size:12px;color:#4a9eff;font-weight:bold;letter-spacing:2px">◉ NERVA MARKET v7.0.1</div><div style="font-size:7px;color:#253d55;letter-spacing:1.5px">GLOBAL COHERENCE GUIDE</div></div><button onclick="hideGuide()" style="background:#162840;border:none;color:#8aafc5;font-size:8px;padding:4px 9px;border-radius:3px;cursor:pointer">✕ CLOSE</button></div><div style="font-size:9px;color:#8aafc5;line-height:1.85">v7 adds a daily ritual: Global Coherence, Signal Story, and Intraday Pulse. Users come back because the market condition evolves through the day.</div></div>`;}

function startTicker(){
  const{mkt,port}=S; if(!mkt) return;
  const items=[{sym:'SPY',p:mkt.spy.price,ch:mkt.spy.chgPct||0},{sym:'QQQ',p:mkt.qqq.price,ch:mkt.qqq.chgPct||0},{sym:'VIX',p:mkt.vix.level,ch:mkt.vix.chgPct||0,raw:true},{sym:'10Y',p:mkt.macro.tny.y,ch:0,pct:true},{sym:'DXY',p:mkt.macro.dxy.l,ch:0,raw:true},...port.map(s=>({sym:s.sym,p:s.price,ch:s.chgPct,nc:s.nerva.color,nd:s.nerva.decision.slice(0,3)})),...(mkt.sorted||[]).slice(0,5).map(([s,v])=>({sym:s,ch:v,p:null}))];
  const triple=[...items,...items,...items], el=document.getElementById('ticker-inner'); if(!el) return; const iW=132;
  el.innerHTML=triple.map(t=>{ const neg=t.ch<0,vc=neg?C.red:C.grn,fmt=t.pct?t.p.toFixed(2)+'%':t.raw?t.p.toFixed(2):t.p?'$'+fp(t.p):null; return `<div style="display:inline-flex;align-items:center;gap:5px;padding:0 11px;border-right:1px solid ${C.border}20;height:26px;min-width:${iW}px"><span style="font-size:8px;color:${t.nc||C.acc};font-weight:bold">${t.sym}</span>${t.nd?`<span style="font-size:6px;color:${t.nc};opacity:.7">${t.nd}</span>`:''}${fmt?`<span style="font-size:8px;color:${C.txt}">${fmt}</span>`:''}<span style="font-size:7.5px;color:${vc}">${neg?'▼':'▲'}${Math.abs(t.ch).toFixed(2)}%</span></div>`; }).join('');
  const total=items.length*iW; if(window._tickerIv) clearInterval(window._tickerIv);
  window._tickerIv=setInterval(()=>{ tickerOffset-=0.55; const el2=document.getElementById('ticker-inner'); if(el2) el2.style.transform=`translateX(${tickerOffset%total}px)`; },25);
}

window.toggleExp=function(sym){S.exp=S.exp===sym?null:sym; renderAll();};
window.setTab=function(t){S.tab=t; S.exp=null; renderAll();};
window.setMode=function(m){S.mode=m; doRefresh();};
window.showGuide=function(){buildGuide(); const g=document.getElementById('guide'); if(g) g.style.display='flex';};
window.hideGuide=function(){const g=document.getElementById('guide'); if(g) g.style.display='none';};

window.doRefresh=async function(){
  try{
    const live=await fetchLiveData(), d=live||genMarket(S.tick); S.isLive=!!live;
    const rawP=mktParams(d), adj=S.mode==='day'?{...rawP,E:Math.min(1,safeNum(rawP.E,.5)*1.22),R:Math.min(1,safeNum(rawP.R,.5)*1.16),Support:Math.max(0,safeNum(rawP.Support,.5)-0.05),Stability:Math.max(0,safeNum(rawP.Stability,.5)-0.06)}:{...rawP,E:safeNum(rawP.E,.5),R:safeNum(rawP.R,.5),Support:safeNum(rawP.Support,.5),Stability:safeNum(rawP.Stability,.5)};
    const res=NERVA.classify(adj);
    ['entropy','coherence','commitProb','score'].forEach(k=>res[k]=safeNum(res[k],k==='score'?50:.5));
    res.bloch={x:safeNum(res.bloch?.x,0),y:safeNum(res.bloch?.y,0),z:safeNum(res.bloch?.z,0)};
    const ex=Math.round((safeNum(d.exec.breakoutRetention,d.exec.br||.5)*.3+safeNum(d.exec.trendReliability,d.exec.rt||.5)*.25+safeNum(d.exec.pullbackBid,d.exec.pb||.5)*.25+safeNum(d.exec.followThrough,d.exec.ft||.5)*.2)*100);
    savePulsePoint(res.score, ex, computeTrust(d,res,ex));
    const livePort=(d.rawPortfolio||[]).length ? d.rawPortfolio.map((raw,i)=>enrichStock(raw,PDEFS.find(x=>x.sym===raw.sym),i,S.tick,d)) : PDEFS.map((s,i)=>genStock(s,i,S.tick));
    const liveUni=(d.rawUniverse||[]).length ? d.rawUniverse.map((raw,i)=>enrichStock(raw,UDEFS.find(x=>x.sym===raw.sym)||{sym:raw.sym,name:inferName(raw.sym),bp:Math.max(raw.price||10,10)},i+100,S.tick,d)) : UDEFS.map((s,i)=>genStock(s,i+100,S.tick));
    const rankedUni=liveUni.sort((a,b)=>((b.nerva.coherence*.35+b.nerva.commitProb*.25+(1-b.nerva.entropy)*.15+b.mtf*.25))-((a.nerva.coherence*.35+a.nerva.commitProb*.25+(1-a.nerva.entropy)*.15+a.mtf*.25)));
    const vl=d.vix.level, vs=Math.min(100,Math.max(0,Math.round((1-Math.min(1,(vl-10)/25))*68+((d.vix.trend5d||0)<0?18:0)+(d.putCall.ratio<1?10:0)))), ts=Math.min(100,Math.max(0,Math.round(adj.S*100 + ((d.spy.chg20d||0)>0?4:-4)))), bs=Math.min(100,Math.max(0,Math.round((d.breadth.a20+d.breadth.a50+d.breadth.a200)/3))), ms=Math.min(100,Math.max(0,Math.round((Object.values(d.sectors).filter(v=>v>0).length/11)*55+Math.max(0,Math.min(45,d.spread*18))+((d.spy.chg5d||0)>0?4:0)))), mc=Math.min(100,Math.max(0,Math.round((d.macro.fed==='dovish'?42:25)+(d.macro.tny.y<4.5?20:10)+(d.macro.fomc>7?20:5)+(d.macro.dxy.t==='weak'?14:9))));
    S={...S,mkt:d,mktR:res,port:livePort,uni:rankedUni,cats:{v:vs,t:ts,b:bs,m:ms,mc},execS:ex,secAgo:0,tick:S.tick+1};
    renderAll();
  }catch(err){
    console.error('NERVA refresh error:',err);
  }
};

setInterval(()=>{S.secAgo++; const el=document.getElementById('sec-ago'); if(el) el.textContent=S.secAgo+'s ago';},1000);
setInterval(()=>doRefresh(),45000);
doRefresh();
</script>
